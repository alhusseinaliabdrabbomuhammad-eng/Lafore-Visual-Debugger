<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lafore Algorithm Visualizer — Cinematic Debugger</title>
<style>
/* ============================================================
   THEME VARIABLES
   ============================================================ */
:root {
  --bg-primary: #0b0b10;
  --bg-secondary: #14141c;
  --bg-tertiary: #1e1e2a;
  --bg-elevated: #252534;
  --bg-tooltip: rgba(30, 30, 42, 0.95);
  --text-primary: #f0f0f5;
  --text-secondary: #a0a0b8;
  --text-muted: #6e6e8a;
  --accent: #00e5ff;
  --accent-dim: rgba(0, 229, 255, 0.15);
  --accent-glow: rgba(0, 229, 255, 0.4);
  --secondary-accent: #ff9100;
  --secondary-dim: rgba(255, 145, 0, 0.15);
  --success: #00e676;
  --warning: #ffea00;
  --danger: #ff1744;
  --breakpoint: #ff1744;
  --active-line-bg: rgba(0, 229, 255, 0.12);
  --active-line-border: rgba(0, 229, 255, 0.6);
  --border-color: rgba(255,255,255,0.06);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.5);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --font-mono: 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono', 'Courier New', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  --transition-fast: 0.15s ease;
  --transition-base: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
  --bg-primary: #f2f2f7;
  --bg-secondary: #ffffff;
  --bg-tertiary: #eaeaef;
  --bg-elevated: #e0e0e8;
  --bg-tooltip: rgba(255, 255, 255, 0.95);
  --text-primary: #1a1a24;
  --text-secondary: #555566;
  --text-muted: #888899;
  --accent: #0066cc;
  --accent-dim: rgba(0, 102, 204, 0.12);
  --accent-glow: rgba(0, 102, 204, 0.3);
  --secondary-accent: #e65100;
  --secondary-dim: rgba(230, 81, 0, 0.12);
  --success: #2e7d32;
  --warning: #f9a825;
  --danger: #c62828;
  --breakpoint: #c62828;
  --active-line-bg: rgba(0, 102, 204, 0.10);
  --active-line-border: rgba(0, 102, 204, 0.5);
  --border-color: rgba(0,0,0,0.08);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.12);
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  transition: background var(--transition-base), color var(--transition-base);
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   APP SHELL — CSS GRID LAYOUT
   ============================================================ */
.app-container {
  display: grid;
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "header"
    "main"
    "controls";
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* ============================================================
   HEADER
   ============================================================ */
.app-header {
  grid-area: header;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 56px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  backdrop-filter: blur(20px);
  z-index: 100;
}

.app-title {
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--accent), var(--secondary-accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-actions {
  display: flex;
  gap: 12px;
  align-items: center;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-color);
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
  font-size: 1rem;
}

.icon-btn:hover {
  background: var(--bg-elevated);
  color: var(--text-primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.icon-btn:active {
  transform: translateY(0);
}

/* ============================================================
   MAIN CONTENT — FLEX/GRID HYBRID
   ============================================================ */
.app-main {
  grid-area: main;
  display: grid;
  grid-template-columns: minmax(360px, 1fr) minmax(0, 1.8fr);
  gap: 1px;
  background: var(--border-color);
  overflow: hidden;
}

/* ============================================================
   CODE PANEL (LEFT)
   ============================================================ */
.code-panel {
  background: var(--bg-secondary);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* Tabs */
.code-tabs {
  display: flex;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border-color);
  padding: 0 16px;
}

.tab-btn {
  padding: 12px 20px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-family: var(--font-sans);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  position: relative;
  transition: color var(--transition-fast);
  letter-spacing: 0.02em;
}

.tab-btn:hover {
  color: var(--text-secondary);
}

.tab-btn.active {
  color: var(--accent);
}

.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 20%;
  width: 60%;
  height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
  animation: tabSlideIn 0.3s ease;
}

@keyframes tabSlideIn {
  from { transform: scaleX(0); opacity: 0; }
  to { transform: scaleX(1); opacity: 1; }
}

/* Tab Content */
.tab-content {
  flex: 1;
  overflow: hidden;
  display: none;
  flex-direction: column;
}

.tab-content.active {
  display: flex;
}

/* Preset Panel */
.preset-panel {
  padding: 16px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.algo-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  font-weight: 700;
}

.algo-select-wrapper {
  position: relative;
}

.algo-select {
  width: 100%;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-color);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 0.9rem;
  cursor: pointer;
  appearance: none;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}

.algo-select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

.algo-select-wrapper::after {
  content: '▼';
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.6rem;
  color: var(--text-muted);
  pointer-events: none;
}

/* Code Display */
.code-display-wrapper {
  flex: 1;
  overflow: auto;
  position: relative;
  background: var(--bg-primary);
}

.code-display {
  display: flex;
  font-family: var(--font-mono);
  font-size: 0.85rem;
  line-height: 1.7;
  min-height: 100%;
}

.line-numbers {
  display: flex;
  flex-direction: column;
  padding: 16px 0 16px 16px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  user-select: none;
  text-align: right;
  color: var(--text-muted);
  min-width: 48px;
}

.line-num {
  padding: 0 12px;
  cursor: pointer;
  position: relative;
  transition: color var(--transition-fast), background var(--transition-fast);
  border-radius: 4px 0 0 4px;
}

.line-num:hover {
  color: var(--text-secondary);
  background: var(--bg-tertiary);
}

.line-num.has-breakpoint::before {
  content: '';
  position: absolute;
  left: 2px;
  top: 50%;
  transform: translateY(-50%);
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--breakpoint);
  box-shadow: 0 0 6px var(--breakpoint);
  animation: breakpointPulse 2s infinite;
}

@keyframes breakpointPulse {
  0%, 100% { opacity: 1; transform: translateY(-50%) scale(1); }
  50% { opacity: 0.7; transform: translateY(-50%) scale(1.2); }
}

.code-content {
  flex: 1;
  padding: 16px 20px;
  white-space: pre;
  overflow-x: auto;
}

.code-line {
  padding: 0 8px;
  border-radius: 0 4px 4px 0;
  border-left: 2px solid transparent;
  transition: background var(--transition-fast), border-color var(--transition-fast);
  position: relative;
}

.code-line.active {
  background: var(--active-line-bg);
  border-left-color: var(--accent);
  animation: activeLinePulse 2s infinite;
}

@keyframes activeLinePulse {
  0%, 100% { box-shadow: inset 4px 0 12px -4px var(--accent-glow); }
  50% { box-shadow: inset 4px 0 20px -4px var(--accent-glow), 0 0 20px -8px var(--accent-glow); }
}

/* Syntax Highlighting */
.hl-keyword { color: var(--accent); font-weight: 600; }
.hl-string { color: var(--secondary-accent); }
.hl-comment { color: var(--text-muted); font-style: italic; }
.hl-number { color: var(--success); }
.hl-type { color: var(--warning); }

/* ============================================================
   CUSTOM CODE PANEL
   ============================================================ */
.custom-panel {
  padding: 16px;
  gap: 12px;
  overflow: auto;
}

.custom-toolbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}

.btn {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-color);
  background: var(--bg-elevated);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all var(--transition-fast);
}

.btn:hover {
  background: var(--bg-tertiary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.btn:active {
  transform: translateY(0);
}

.btn-primary {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

[data-theme="light"] .btn-primary {
  color: #fff;
}

.btn-primary:hover {
  background: var(--accent);
  filter: brightness(1.1);
  box-shadow: 0 0 16px var(--accent-glow);
}

.btn-magic {
  background: linear-gradient(135deg, #9c27b0, #e91e63);
  color: #fff;
  border-color: transparent;
}

.btn-magic:hover {
  filter: brightness(1.15);
  box-shadow: 0 4px 16px rgba(233, 30, 99, 0.35);
}

.code-editor-wrapper {
  position: relative;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--bg-primary);
}

.code-editor {
  width: 100%;
  min-height: 280px;
  padding: 14px;
  border: none;
  background: transparent;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  line-height: 1.6;
  resize: vertical;
  outline: none;
  tab-size: 4;
}

.code-preview {
  padding: 14px;
  border-top: 1px solid var(--border-color);
  background: var(--bg-secondary);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  line-height: 1.6;
  min-height: 60px;
  max-height: 200px;
  overflow: auto;
  white-space: pre;
}

.custom-input-section {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.custom-input-section label {
  font-size: 0.8rem;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.custom-input {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-color);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  outline: none;
  transition: border-color var(--transition-fast);
}

.custom-input:focus {
  border-color: var(--accent);
}

.error-panel {
  display: none;
  padding: 12px;
  border-radius: var(--radius-sm);
  background: rgba(255, 23, 68, 0.08);
  border: 1px solid rgba(255, 23, 68, 0.2);
  color: var(--danger);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  line-height: 1.5;
}

.error-panel.visible {
  display: block;
  animation: errorSlideIn 0.3s ease;
}

@keyframes errorSlideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.error-line {
  background: rgba(255, 23, 68, 0.15);
  padding: 2px 4px;
  border-radius: 3px;
}

/* ============================================================
   VISUALIZATION PANEL (RIGHT)
   ============================================================ */
.viz-panel {
  background: var(--bg-primary);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.canvas-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#vizCanvas {
  display: block;
  width: 100%;
  height: 100%;
}

.canvas-overlay {
  position: absolute;
  top: 16px;
  left: 16px;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.viz-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: 100px;
  background: var(--bg-tooltip);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-color);
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  box-shadow: var(--shadow-sm);
  animation: fadeSlideDown 0.5s ease;
}

@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.viz-badge .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: dotPulse 2s infinite;
}

@keyframes dotPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Variables & Call Stack Panel */
.variables-panel {
  height: 180px;
  min-height: 140px;
  max-height: 300px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  resize: vertical;
  overflow: hidden;
}

.vars-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border-color);
  background: var(--bg-tertiary);
}

.vars-title {
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
}

.vars-content {
  flex: 1;
  overflow: auto;
  padding: 12px 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.vars-section {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.vars-section-title {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}

.var-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--bg-tertiary);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-color);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
  animation: varCardIn 0.3s ease;
}

@keyframes varCardIn {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}

.var-card:hover {
  transform: translateX(4px);
  box-shadow: var(--shadow-sm);
}

.var-name {
  color: var(--accent);
  font-weight: 600;
}

.var-value {
  color: var(--text-primary);
  background: var(--bg-primary);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.85em;
}

.call-stack-frame {
  padding: 10px 12px;
  background: var(--bg-tertiary);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-color);
  border-left: 3px solid var(--secondary-accent);
  margin-bottom: 8px;
  transition: all var(--transition-fast);
  animation: frameIn 0.3s ease;
}

@keyframes frameIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

.call-stack-frame.active {
  border-left-color: var(--accent);
  background: var(--active-line-bg);
  box-shadow: 0 0 12px var(--accent-dim);
}

.frame-header {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.frame-vars {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.frame-var {
  font-size: 0.75rem;
  color: var(--text-secondary);
  font-family: var(--font-mono);
}

/* ============================================================
   CONTROL BAR — VIDEO PLAYER STYLE
   ============================================================ */
.control-bar {
  grid-area: controls;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  z-index: 100;
}

.scrubber-track {
  width: 100%;
  height: 6px;
  background: var(--bg-tertiary);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.scrubber-track:hover {
  height: 10px;
}

.scrubber-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--secondary-accent));
  width: 0%;
  transition: width 0.1s linear;
  position: relative;
}

.scrubber-fill::after {
  content: '';
  position: absolute;
  right: -6px;
  top: 50%;
  transform: translateY(-50%);
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 8px var(--accent);
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.scrubber-track:hover .scrubber-fill::after {
  opacity: 1;
}

.scrubber-buffer {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: var(--bg-elevated);
  width: 100%;
  opacity: 0.5;
}

.controls-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  gap: 16px;
}

.controls-left, .controls-center, .controls-right {
  display: flex;
  align-items: center;
  gap: 6px;
}

.control-btn {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-color);
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
  font-size: 0.9rem;
  position: relative;
}

.control-btn:hover:not(:disabled) {
  background: var(--bg-elevated);
  color: var(--text-primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.control-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

.control-btn.play-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--accent);
  color: #000;
  font-size: 1.1rem;
  border: none;
}

[data-theme="light"] .control-btn.play-btn {
  color: #fff;
}

.control-btn.play-btn:hover:not(:disabled) {
  transform: scale(1.08);
  box-shadow: 0 0 20px var(--accent-glow);
}

.control-btn.play-btn:disabled {
  background: var(--bg-elevated);
  color: var(--text-muted);
}

.step-counter {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--text-secondary);
  min-width: 100px;
  text-align: center;
  letter-spacing: 0.02em;
}

.step-counter .current {
  color: var(--accent);
  font-weight: 700;
  font-size: 1.05em;
}

.speed-control {
  display: flex;
  align-items: center;
  gap: 10px;
}

.speed-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.speed-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100px;
  height: 4px;
  border-radius: 2px;
  background: var(--bg-elevated);
  outline: none;
  cursor: pointer;
}

.speed-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 8px var(--accent-glow);
  transition: transform var(--transition-fast);
}

.speed-slider::-webkit-slider-thumb:hover {
  transform: scale(1.3);
}

.speed-slider::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: none;
  box-shadow: 0 0 8px var(--accent-glow);
}

.speed-value {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-secondary);
  min-width: 36px;
}

/* ============================================================
   TOAST NOTIFICATIONS
   ============================================================ */
#toastContainer {
  position: fixed;
  bottom: 90px;
  right: 24px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
}

.toast {
  padding: 14px 20px;
  border-radius: var(--radius-md);
  background: var(--bg-tooltip);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  font-size: 0.9rem;
  font-weight: 500;
  box-shadow: var(--shadow-md);
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 280px;
  max-width: 420px;
  pointer-events: auto;
  animation: toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  transition: opacity 0.3s ease, transform 0.3s ease;
}

.toast.hiding {
  opacity: 0;
  transform: translateX(40px);
}

.toast-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
}

.toast-info .toast-icon { background: var(--accent-dim); color: var(--accent); }
.toast-success .toast-icon { background: rgba(0, 230, 118, 0.15); color: var(--success); }
.toast-warning .toast-icon { background: rgba(255, 234, 0, 0.15); color: var(--warning); }
.toast-error .toast-icon { background: rgba(255, 23, 68, 0.15); color: var(--danger); }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(40px) scale(0.9); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}

/* ============================================================
   HELP MODAL
   ============================================================ */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 2000;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  opacity: 0;
  transition: opacity var(--transition-base);
}

.modal.open {
  display: flex;
  opacity: 1;
}

.modal-content {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  width: 90%;
  max-width: 600px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-md);
  transform: scale(0.95);
  transition: transform var(--transition-base);
}

.modal.open .modal-content {
  transform: scale(1);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border-color);
}

.modal-title {
  font-size: 1.2rem;
  font-weight: 700;
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.5rem;
  cursor: pointer;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  transition: all var(--transition-fast);
}

.modal-close:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.modal-body {
  padding: 20px 24px;
  overflow: auto;
}

.shortcuts-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 12px 24px;
  font-size: 0.9rem;
}

.shortcut-key {
  font-family: var(--font-mono);
  background: var(--bg-tertiary);
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-color);
  font-size: 0.85rem;
  color: var(--accent);
  font-weight: 600;
  text-align: center;
  min-width: 80px;
}

.shortcut-desc {
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ============================================================
   HISTORY PANEL
   ============================================================ */
.history-panel {
  position: fixed;
  right: 0;
  top: 56px;
  bottom: 0;
  width: 320px;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-color);
  transform: translateX(100%);
  transition: transform var(--transition-base);
  z-index: 150;
  display: flex;
  flex-direction: column;
}

.history-panel.open {
  transform: translateX(0);
}

.history-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.history-title {
  font-size: 0.9rem;
  font-weight: 700;
}

.history-list {
  flex: 1;
  overflow: auto;
  padding: 12px;
}

.history-item {
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  cursor: pointer;
  transition: all var(--transition-fast);
  border: 1px solid transparent;
  font-size: 0.85rem;
}

.history-item:hover {
  background: var(--bg-tertiary);
  border-color: var(--border-color);
}

.history-item.active {
  background: var(--active-line-bg);
  border-color: var(--active-line-border);
}

.history-step-num {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 2px;
}

.history-desc {
  color: var(--text-secondary);
  line-height: 1.4;
}

/* ============================================================
   TOOLTIP SYSTEM
   ============================================================ */
.tooltip {
  position: absolute;
  z-index: 3000;
  padding: 10px 14px;
  border-radius: var(--radius-md);
  background: var(--bg-tooltip);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  font-size: 0.85rem;
  max-width: 280px;
  box-shadow: var(--shadow-md);
  pointer-events: none;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity var(--transition-fast), transform var(--transition-fast);
}

.tooltip.visible {
  opacity: 1;
  transform: translateY(0);
}

.tooltip-title {
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--accent);
}

.tooltip-ar {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  direction: rtl;
  text-align: right;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--border-color);
  color: var(--text-secondary);
  font-size: 0.8rem;
}

/* ============================================================
   RESPONSIVE BREAKPOINTS
   ============================================================ */
@media (max-width: 1024px) {
  .app-main {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr 1fr;
  }
  .code-panel {
    max-height: 50vh;
  }
}

@media (max-width: 768px) {
  .app-header {
    padding: 0 12px;
    height: 48px;
  }
  .app-title {
    font-size: 0.95rem;
  }
  .controls-row {
    padding: 8px 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .controls-left, .controls-right {
    gap: 4px;
  }
  .control-btn {
    width: 32px;
    height: 32px;
    font-size: 0.8rem;
  }
  .control-btn.play-btn {
    width: 38px;
    height: 38px;
  }
  .speed-control {
    display: none;
  }
  .step-counter {
    min-width: auto;
    font-size: 0.75rem;
  }
  .history-panel {
    width: 100%;
  }
  .vars-content {
    grid-template-columns: 1fr;
  }
}

/* ============================================================
   SCROLLBAR STYLING
   ============================================================ */
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--bg-elevated);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--text-muted);
}

/* ============================================================
   SELECTION & FOCUS
   ============================================================ */
::selection {
  background: var(--accent-dim);
  color: var(--text-primary);
}

*:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
}
</style>
</head>
<body>

<!-- ============================================================
     APPLICATION SHELL
     ============================================================ -->
<div class="app-container">

  <!-- Header -->
  <header class="app-header">
    <div class="app-title">⚡ Lafore Visual Debugger</div>
    <div class="header-actions">
      <button class="icon-btn" id="historyToggleBtn" title="Execution History (H)">📜</button>
      <button class="icon-btn" id="themeToggleBtn" title="Toggle Theme">🌓</button>
      <button class="icon-btn" id="helpBtn" title="Keyboard Shortcuts (?)">❓</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="app-main">

    <!-- Code Panel -->
    <section class="code-panel">
      <div class="code-tabs">
        <button class="tab-btn active" data-tab="preset">Preset Examples</button>
        <button class="tab-btn" data-tab="custom">Custom Code</button>
      </div>

      <!-- Preset Tab -->
      <div class="tab-content active" id="tab-preset">
        <div class="preset-panel">
          <div class="algo-label">Select Algorithm</div>
          <div class="algo-select-wrapper">
            <select class="algo-select" id="algorithmSelect">
              <option value="" disabled selected>Choose an algorithm...</option>
            </select>
          </div>
        </div>
        <div class="code-display-wrapper" id="codeDisplayWrapper">
          <div class="code-display" id="codeDisplay">
            <div class="line-numbers" id="lineNumbers"></div>
            <div class="code-content" id="codeContent"></div>
          </div>
        </div>
      </div>

      <!-- Custom Code Tab -->
      <div class="tab-content" id="tab-custom">
        <div class="custom-panel">
          <div class="custom-toolbar">
            <button class="btn btn-primary" id="runCustomBtn">▶ Run Custom Code</button>
            <button class="btn btn-magic" id="aiFixBtn">✨ AI Fix Code</button>
            <button class="btn" id="clearCustomBtn">🗑 Clear</button>
          </div>

          <div class="code-editor-wrapper">
            <textarea class="code-editor" id="customCodeEditor" placeholder="// Write your Java code here..." spellcheck="false"></textarea>
          </div>

          <div class="code-preview" id="customCodePreview"></div>

          <div class="custom-input-section">
            <label>Custom Input (comma-separated or JSON)</label>
            <input type="text" class="custom-input" id="customInput" placeholder="e.g. 5,2,8,1,9 or {&quot;array&quot;:[3,1,4]}">
          </div>

          <div class="error-panel" id="errorPanel"></div>
        </div>
      </div>
    </section>

    <!-- Visualization Panel -->
    <section class="viz-panel">
      <div class="canvas-container" id="canvasContainer">
        <canvas id="vizCanvas"></canvas>
        <div class="canvas-overlay">
          <div class="viz-badge" id="vizBadge" style="display:none;">
            <span class="dot"></span>
            <span id="vizBadgeText">Ready</span>
          </div>
        </div>
      </div>

      <div class="variables-panel">
        <div class="vars-header">
          <span class="vars-title">Variables & Call Stack</span>
          <span id="callStackDepth" style="font-size:0.75rem;color:var(--text-muted);"></span>
        </div>
        <div class="vars-content" id="varsContent">
          <div class="vars-section" id="variablesSection">
            <div class="vars-section-title">Local Variables</div>
            <div id="variablesList"></div>
          </div>
          <div class="vars-section" id="callStackSection">
            <div class="vars-section-title">Call Stack</div>
            <div id="callStackList"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Control Bar -->
  <footer class="control-bar">
    <div class="scrubber-track" id="scrubberTrack">
      <div class="scrubber-buffer"></div>
      <div class="scrubber-fill" id="scrubberFill"></div>
    </div>
    <div class="controls-row">
      <div class="controls-left">
        <button class="control-btn" id="btnStepBack" title="Step Back (←)">⏮</button>
        <button class="control-btn" id="btnRestart" title="Restart Program (R)">⏹</button>
        <button class="control-btn" id="btnStepOver" title="Step Over (→)">⏭</button>
        <button class="control-btn" id="btnStepInto" title="Step Into (↓)">⤵</button>
        <button class="control-btn" id="btnStepOut" title="Step Out (↑)">⤴</button>
        <button class="control-btn" id="btnNextBlock" title="Next Block (N)">⏩</button>
      </div>

      <div class="controls-center">
        <button class="control-btn play-btn" id="btnPlay" title="Play/Pause (Space)">▶</button>
      </div>

      <div class="controls-right">
        <div class="step-counter">
          <span class="current" id="stepCurrent">0</span> / <span id="stepTotal">0</span>
        </div>
        <div class="speed-control">
          <span class="speed-label">Speed</span>
          <input type="range" class="speed-slider" id="speedSlider" min="0.25" max="4" step="0.25" value="1">
          <span class="speed-value" id="speedValue">1.0x</span>
        </div>
      </div>
    </div>
  </footer>

</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="tooltipTitle"></div>
  <div id="tooltipBody"></div>
  <div class="tooltip-ar" id="tooltipAr"></div>
</div>

<!-- Help Modal -->
<div class="modal" id="helpModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">⌨️ Keyboard Shortcuts</div>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="shortcuts-grid" id="shortcutsGrid"></div>
    </div>
  </div>
</div>

<!-- History Panel -->
<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <span class="history-title">📜 Execution History</span>
    <button class="icon-btn" id="historyCloseBtn">&times;</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<!-- ============================================================
     JAVASCRIPT — PART 1: FOUNDATION & ARCHITECTURE
     ============================================================ -->
<script>
/* ============================================================
   SECTION 1: STATE MANAGEMENT ARCHITECTURE
   ============================================================ */

/**
 * Central state object for the entire application.
 * All UI updates derive from this single source of truth.
 */
const STATE = {
  // Current algorithm identifier (matches key in ALGORITHM_REGISTRY)
  algorithm: null,

  // Pre-computed execution steps array
  // Each step: { lineNumber, variablesSnapshot, dataStructureSnapshot, callStackSnapshot, description, category }
  steps: [],

  // Current position in the steps array (-1 = before start)
  currentStepIndex: -1,

  // Set of line numbers that have breakpoints set
  breakpoints: new Set(),

  // Playback speed multiplier (0.25 to 4.0)
  speed: 1.0,

  // Whether auto-play is currently active
  isPlaying: false,

  // 'dark' or 'light'
  theme: 'dark',

  // True when user is in custom code mode
  isCustomMode: false,

  // Raw custom code from textarea
  customCode: '',

  // Raw custom input string
  customInput: '',

  // AI-corrected version of custom code
  aiFixedCode: '',

  // Interval ID for auto-play timer
  playInterval: null,

  // Total steps (cached for UI display)
  totalSteps: 0,

  // Current visualization category (determines renderer)
  vizCategory: null,

  // Animation state for smooth canvas transitions
  vizAnim: {
    progress: 0,
    duration: 400,
    startTime: 0,
    fromState: null,
    toState: null,
    isPlaying: false
  },

  // Flag indicating if steps have been generated
  stepsGenerated: false
};

/* ============================================================
   SECTION 2: CONFIGURATION & CONSTANTS
   ============================================================ */

const CONFIG = {
  MIN_SPEED: 0.25,
  MAX_SPEED: 4.0,
  DEFAULT_SPEED: 1.0,
  ANIMATION_DURATION: 400,
  STEP_DELAY_BASE: 800,
  STORAGE_KEYS: {
    THEME: 'lafore_viz_theme',
    CUSTOM_CODE: 'lafore_viz_custom_code',
    CUSTOM_INPUT: 'lafore_viz_custom_input',
    AI_FIXED_CODE: 'lafore_viz_ai_fixed',
    LAST_ALGORITHM: 'lafore_viz_last_algo'
  },
  ALGORITHMS: [
    { key: 'binary-tree', name: 'Binary Tree (Insertion & Traversals)', category: 'tree' },
    { key: 'hash-table', name: 'Hash Table (Separate Chaining)', category: 'hash' },
    { key: 'recursion-factorial', name: 'Recursion: Factorial', category: 'recursion' },
    { key: 'recursion-mergesort', name: 'Recursion: Merge Sort', category: 'recursion' },
    { key: 'merge-sort', name: 'Merge Sort', category: 'sort' },
    { key: 'quick-sort', name: 'Quick Sort', category: 'sort' },
    { key: 'shell-sort', name: 'Shell Sort', category: 'sort' },
    { key: 'radix-sort', name: 'Radix Sort', category: 'sort' },
    { key: 'stack-array', name: 'Stack (Array-based)', category: 'stack' },
    { key: 'queue-array', name: 'Queue (Circular Array)', category: 'queue' },
    { key: 'deque-array', name: 'Deque (Array-based)', category: 'deque' },
    { key: 'linked-list', name: 'Singly Linked List', category: 'list' },
    { key: 'doubly-linked-list', name: 'Doubly Linked List', category: 'list' },
    { key: 'stack-linked', name: 'Stack (Linked List)', category: 'stack' },
    { key: 'queue-linked', name: 'Queue (Linked List)', category: 'queue' },
    { key: 'deque-linked', name: 'Deque (Linked List)', category: 'deque' }
  ]
};

/**
 * Registry that will hold all algorithm implementations.
 * Populated in Part 2 with Lafore-based Java code and step generators.
 */
const ALGORITHM_REGISTRY = {};

/* ============================================================
   SECTION 3: UTILITY FUNCTIONS
   ============================================================ */

/** Clamp a value between min and max inclusive. */
function clamp(val, min, max) {
  return Math.max(min, Math.min(max, val));
}

/** Linear interpolation between a and b by factor t (0..1). */
function lerp(a, b, t) {
  return a + (b - a) * t;
}

/** Easing function: ease-in-out cubic. */
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

/** Escape HTML special characters to prevent injection. */
function escapeHtml(str) {
  if (typeof str !== 'string') return String(str);
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

/** Debounce a function by ms milliseconds. */
function debounce(fn, ms) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}

/** Deep clone a simple JSON-serializable object. */
function deepClone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

/** Format a number with fixed decimals if needed. */
function fmtNum(n) {
  if (Number.isInteger(n)) return String(n);
  return n.toFixed(2);
}

/** Generate a simple hash for strings. */
function hashString(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return h;
}

/* ============================================================
   SECTION 4: LOCAL STORAGE PERSISTENCE
   ============================================================ */

function saveToStorage(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {
    console.warn('localStorage save failed:', e);
  }
}

function loadFromStorage(key, defaultValue) {
  try {
    const item = localStorage.getItem(key);
    return item !== null ? JSON.parse(item) : defaultValue;
  } catch (e) {
    console.warn('localStorage load failed:', e);
    return defaultValue;
  }
}

/* ============================================================
   SECTION 5: THEME SYSTEM
   ============================================================ */

function initTheme() {
  const saved = loadFromStorage(CONFIG.STORAGE_KEYS.THEME, 'dark');
  STATE.theme = saved;
  applyTheme(saved);
}

function toggleTheme() {
  STATE.theme = STATE.theme === 'dark' ? 'light' : 'dark';
  applyTheme(STATE.theme);
  saveToStorage(CONFIG.STORAGE_KEYS.THEME, STATE.theme);
  showToast(`Switched to ${STATE.theme} mode`, 'info');
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
}

/* ============================================================
   SECTION 6: TOAST NOTIFICATION SYSTEM
   ============================================================ */

function showToast(message, type = 'info', duration = 3000) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;

  const icons = { info: 'ℹ️', success: '✅', warning: '⚠️', error: '❌' };
  toast.innerHTML = `
    <div class="toast-icon">${icons[type] || 'ℹ️'}</div>
    <div>${escapeHtml(message)}</div>
  `;

  container.appendChild(toast);

  // Auto-remove after duration
  setTimeout(() => {
    toast.classList.add('hiding');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

/* ============================================================
   SECTION 7: HELP MODAL & SHORTCUTS
   ============================================================ */

const SHORTCUTS = [
  { key: '→', desc: 'Step forward one line (Step Over)', ar: 'خطوة للأمام' },
  { key: '←', desc: 'Step backward one line (Undo)', ar: 'تراجع خطوة' },
  { key: 'Space', desc: 'Play / Pause auto-animation', ar: 'تشغيل / إيقاف' },
  { key: 'R', desc: 'Restart program from beginning', ar: 'إعادة التشغيل' },
  { key: 'B', desc: 'Toggle breakpoint on current line', ar: 'تبديل نقطة التوقف' },
  { key: '↓', desc: 'Step Into function call', ar: 'الدخول إلى الدالة' },
  { key: '↑', desc: 'Step Out of current function', ar: 'الخروج من الدالة' },
  { key: 'N', desc: 'Skip to next block (loop/conditional)', ar: 'تخطي إلى الكتلة التالية' },
  { key: 'H', desc: 'Toggle execution history panel', ar: 'لوحة التاريخ' },
  { key: '?', desc: 'Show this help modal', ar: 'عرض المساعدة' },
  { key: 'F', desc: 'AI Fix Code (Custom Code mode)', ar: 'إصلاح الذكاء الاصطناعي' }
];

function initHelpModal() {
  const grid = document.getElementById('shortcutsGrid');
  grid.innerHTML = SHORTCUTS.map(s => `
    <div class="shortcut-key">${escapeHtml(s.key)}</div>
    <div class="shortcut-desc">
      ${escapeHtml(s.desc)}

/* ============================================================
   SECTION 8: KEYBOARD SHORTCUTS HANDLER
   ============================================================ */

function handleKeydown(e) {
  // Don't trigger shortcuts when typing in inputs/textareas
  const tag = e.target.tagName.toLowerCase();
  const isInput = tag === 'input' || tag === 'textarea' || e.target.isContentEditable;
  if (isInput && e.key !== 'Escape') return;

  switch (e.key) {
    case 'ArrowRight':
      e.preventDefault();
      stepOver();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      stepBack();
      break;
    case 'ArrowDown':
      e.preventDefault();
      stepInto();
      break;
    case 'ArrowUp':
      e.preventDefault();
      stepOut();
      break;
    case ' ':
      e.preventDefault();
      togglePlay();
      break;
    case 'r':
    case 'R':
      e.preventDefault();
      restartProgram();
      break;
    case 'b':
    case 'B':
      e.preventDefault();
      if (STATE.steps.length > 0) {
        const currentLine = STATE.steps[STATE.currentStepIndex]?.lineNumber ?? 1;
        toggleBreakpoint(currentLine);
      }
      break;
    case 'n':
    case 'N':
      e.preventDefault();
      nextBlock();
      break;
    case 'h':
    case 'H':
      e.preventDefault();
      toggleHistoryPanel();
      break;
    case 'f':
    case 'F':
      e.preventDefault();
      if (STATE.isCustomMode) {
        aiFixCode();
      } else {
        showToast('AI Fix is only available in Custom Code mode', 'warning');
      }
      break;
    case '?':
      e.preventDefault();
      openHelpModal();
      break;
    case 'Escape':
      closeHelpModal();
      break;
  }
}

function initAlgorithmSelector() {
  const select = document.getElementById('algorithmSelect');

  // Populate dropdown from CONFIG
  const categories = {};
  CONFIG.ALGORITHMS.forEach(algo => {
    if (!categories[algo.category]) categories[algo.category] = [];
    categories[algo.category].push(algo);
  });

  // Sort categories for consistent order
  const categoryOrder = ['tree', 'hash', 'recursion', 'sort', 'stack', 'queue', 'deque', 'list'];
  categoryOrder.forEach(cat => {
    if (!categories[cat]) return;
    const group = document.createElement('optgroup');
    group.label = cat.charAt(0).toUpperCase() + cat.slice(1) + 's';
    categories[cat].forEach(algo => {
      const opt = document.createElement('option');
      opt.value = algo.key;
      opt.textContent = algo.name;
      group.appendChild(opt);
    });
    select.appendChild(group);
  });

  select.addEventListener('change', (e) => {
    if (e.target.value) {
      onAlgorithmChange(e.target.value);

  // Restore last selection if any
  const lastAlgo = loadFromStorage(CONFIG.STORAGE_KEYS.LAST_ALGORITHM, '');
  if (lastAlgo) {

    if (select.value === lastAlgo) {
      onAlgorithmChange(lastAlgo);

  STATE.isCustomMode = false;
  STATE.stepsGenerated = false;
  STATE.currentStepIndex = -1;
  STATE.breakpoints.clear();

  saveToStorage(CONFIG.STORAGE_KEYS.LAST_ALGORITHM, key);

  // Update tab UI to show preset tab
  switchTab('preset');

  const algoMeta = CONFIG.ALGORITHMS.find(a => a.key === key);

/* ============================================================
   SECTION 11: SYNTAX HIGHLIGHTING (Java)
   ============================================================ */

function highlightJava(code) {
  if (!code) return '';
  // Escape first
  let html = escapeHtml(code);

  // Multi-line comments
  html = html.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="hl-comment">$1</span>');

  // Single-line comments
  html = html.replace(/(\/\/.*$)/gm, '<span class="hl-comment">$1</span>');

  // Strings (simple, non-escaped handling)
  html = html.replace(/("(?:\\.|[^"\\])*")/g, '<span class="hl-string">$1</span>');

  // Keywords
  const keywords = [
    'public','private','protected','static','final','abstract','class','interface',
    'extends','implements','void','int','long','double','float','boolean','char',
    'byte','short','if','else','for','while','do','switch','case','default','break',
    'continue','return','new','this','super','null','true','false','try','catch',
    'finally','throw','throws','import','package','synchronized','volatile','transient'
  ];
  const kwRegex = new RegExp(`\\b(${keywords.join('|')})\\b`, 'g');
  html = html.replace(kwRegex, '<span class="hl-keyword">$1</span>');

  // Types (capitalized identifiers common in Java)
  html = html.replace(/\b([A-Z][a-zA-Z0-9_]*)\b/g, '<span class="hl-type">$1</span>');

  // Numbers
  html = html.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="hl-number">$1</span>');

  return html;
}

function initControlBar() {
  document.getElementById('btnStepBack').addEventListener('click', stepBack);
  document.getElementById('btnRestart').addEventListener('click', restartProgram);
  document.getElementById('btnStepOver').addEventListener('click', stepOver);
  document.getElementById('btnStepInto').addEventListener('click', stepInto);
  document.getElementById('btnStepOut').addEventListener('click', stepOut);
  document.getElementById('btnNextBlock').addEventListener('click', nextBlock);
  document.getElementById('btnPlay').addEventListener('click', togglePlay);

  const speedSlider = document.getElementById('speedSlider');
  speedSlider.addEventListener('input', (e) => {
    const val = parseFloat(e.target.value);
    setSpeed(val);
  });

  // Scrubber interaction
  const scrubberTrack = document.getElementById('scrubberTrack');
  let scrubbing = false;

  const updateFromScrubber = (clientX) => {
    const rect = scrubberTrack.getBoundingClientRect();
    const ratio = clamp((clientX - rect.left) / rect.width, 0, 1);
    const targetIndex = Math.round(ratio * (STATE.totalSteps - 1));
    jumpToStep(targetIndex);
  };

  scrubberTrack.addEventListener('mousedown', (e) => {
    scrubbing = true;
    updateFromScrubber(e.clientX);
  });
  document.addEventListener('mousemove', (e) => {
    if (scrubbing) updateFromScrubber(e.clientX);
  });
  document.addEventListener('mouseup', () => {
    scrubbing = false;
  });

  // Touch support for scrubber
  scrubberTrack.addEventListener('touchstart', (e) => {
    scrubbing = true;
    updateFromScrubber(e.touches[0].clientX);
  }, { passive: false });
  document.addEventListener('touchmove', (e) => {
    if (scrubbing) {
      e.preventDefault();
      updateFromScrubber(e.touches[0].clientX);
    }
  }, { passive: false });
  document.addEventListener('touchend', () => {
    scrubbing = false;
  });
}

function setSpeed(val) {
  STATE.speed = clamp(val, CONFIG.MIN_SPEED, CONFIG.MAX_SPEED);
  document.getElementById('speedSlider').value = STATE.speed;
  document.getElementById('speedValue').textContent = STATE.speed.toFixed(2) + 'x';
  // If playing, restart interval with new speed
  if (STATE.isPlaying) {
    stopAutoPlay();
    startAutoPlay();
  }
}

function updateControlBarState() {
  const hasSteps = STATE.stepsGenerated && STATE.totalSteps > 0;
  const atStart = STATE.currentStepIndex <= -1;
  const atEnd = STATE.currentStepIndex >= STATE.totalSteps - 1;

  document.getElementById('btnStepBack').disabled = !hasSteps || atStart;
  document.getElementById('btnRestart').disabled = !hasSteps;
  document.getElementById('btnStepOver').disabled = !hasSteps || atEnd;
  document.getElementById('btnStepInto').disabled = !hasSteps || atEnd;
  document.getElementById('btnStepOut').disabled = !hasSteps || atEnd;
  document.getElementById('btnNextBlock').disabled = !hasSteps || atEnd;
  document.getElementById('btnPlay').disabled = !hasSteps || atEnd;

  const playBtn = document.getElementById('btnPlay');
  playBtn.textContent = STATE.isPlaying ? '⏸' : '▶';

  updateStepCounter();
  updateScrubber();
}

function updateStepCounter() {
  document.getElementById('stepCurrent').textContent = Math.max(0, STATE.currentStepIndex + 1);
  document.getElementById('stepTotal').textContent = STATE.totalSteps;
}

function updateScrubber() {
  const fill = document.getElementById('scrubberFill');
  if (STATE.totalSteps <= 0) {
    fill.style.width = '0%';
    return;
  }
  const ratio = (STATE.currentStepIndex + 1) / STATE.totalSteps;
  fill.style.width = (ratio * 100) + '%';
}

/* ============================================================
   SECTION 15: STEP NAVIGATION (SKELETON — FULL LOGIC IN PART 5)
   ============================================================ */

/**
 * Jump directly to a specific step index.
 */
function jumpToStep(index) {
  if (!STATE.stepsGenerated || STATE.totalSteps === 0) return;
  index = clamp(index, -1, STATE.totalSteps - 1);
  STATE.currentStepIndex = index;
  refreshUI();
}

function stepOver() {
  if (!STATE.stepsGenerated) return;
  if (STATE.currentStepIndex < STATE.totalSteps - 1) {
    STATE.currentStepIndex++;
    refreshUI();
  } else {
    showToast('End of execution reached', 'warning', 1500);
  }
}

function stepBack() {
  if (!STATE.stepsGenerated) return;
  if (STATE.currentStepIndex > -1) {
    STATE.currentStepIndex--;
    refreshUI();
  } else {
    showToast('Already at the beginning', 'warning', 1500);
  }
}

function stepInto() {
  // Placeholder: in Part 5, this will find the next function call step
  stepOver();
}

function stepOut() {
  // Placeholder: in Part 5, this will run until current function returns
  showToast('Step Out: will be fully implemented in Part 5', 'info');
}

function nextBlock() {
  // Placeholder: in Part 5, this skips to end of current loop/conditional
  showToast('Next Block: will be fully implemented in Part 5', 'info');
}

function restartProgram() {
  if (!STATE.stepsGenerated) return;
  stopAutoPlay();
  STATE.currentStepIndex = -1;
  refreshUI();
  showToast('Program restarted', 'info');
}

function restartFunction() {
  // Placeholder for Part 5
  showToast('Restart Function: will be fully implemented in Part 5', 'info');
}

function runToBreakpoint() {
  if (!STATE.stepsGenerated || STATE.breakpoints.size === 0) {
    showToast('No breakpoints set', 'warning');
    return;
  }
  stopAutoPlay();
  // Find next breakpoint after current position
  for (let i = STATE.currentStepIndex + 1; i < STATE.totalSteps; i++) {
    const line = STATE.steps[i].lineNumber;
    if (STATE.breakpoints.has(line)) {
      STATE.currentStepIndex = i;
      refreshUI();
      showToast(`Hit breakpoint at line ${line}`, 'success');
      return;
    }
  }
  showToast('No more breakpoints ahead', 'warning');
}

function togglePlay() {
  if (!STATE.stepsGenerated) return;
  if (STATE.isPlaying) {
    stopAutoPlay();
  } else {
    if (STATE.currentStepIndex >= STATE.totalSteps - 1) {
      STATE.currentStepIndex = -1;
    }
    startAutoPlay();
  }
  updateControlBarState();
}

function startAutoPlay() {
  STATE.isPlaying = true;
  updateControlBarState();
  const delay = CONFIG.STEP_DELAY_BASE / STATE.speed;
  STATE.playInterval = setInterval(() => {
    if (STATE.currentStepIndex >= STATE.totalSteps - 1) {
      stopAutoPlay();
      return;
    }
    STATE.currentStepIndex++;
    refreshUI();
  }, delay);
}

function stopAutoPlay() {
  STATE.isPlaying = false;
  if (STATE.playInterval) {
    clearInterval(STATE.playInterval);
    STATE.playInterval = null;
  }
  updateControlBarState();
}

/* ============================================================
   SECTION 16: UI REFRESH (Called after every step change)
   ============================================================ */

function refreshUI() {
  const step = STATE.steps[STATE.currentStepIndex];

  // Update code highlighting
  if (step && step.lineNumber) {
    updateActiveLine(step.lineNumber);
  } else {
    document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active'));
  }

  // Update variables panel
  updateVariablesPanel(step);

  // Update control bar
  updateControlBarState();

  // Trigger canvas redraw (Part 3)
  requestAnimationFrame(drawCanvas);

  // Add to history if moving forward
  if (step && STATE.currentStepIndex >= 0) {
    addHistoryEntry(STATE.currentStepIndex, step.description || 'Executing...');
  }
}

function updateVariablesPanel(step) {
  const varsList = document.getElementById('variablesList');
  const callStackList = document.getElementById('callStackList');
  const depthLabel = document.getElementById('callStackDepth');

  if (!step) {
    varsList.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;">No execution data</div>';
    callStackList.innerHTML = '';
    depthLabel.textContent = '';
    return;
  }

  // Local variables
  const vars = step.variablesSnapshot || {};
  const varEntries = Object.entries(vars);
  if (varEntries.length === 0) {
    varsList.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;">No local variables</div>';
  } else {
    varsList.innerHTML = varEntries.map(([name, value]) => `
      <div class="var-card">
        <span class="var-name">${escapeHtml(name)}</span>
        <span class="var-value">${escapeHtml(JSON.stringify(value))}</span>
      </div>
    `).join('');
  }

  // Call stack
  const stack = step.callStackSnapshot || [];
  depthLabel.textContent = stack.length > 0 ? `Depth: ${stack.length}` : '';
  if (stack.length === 0) {
    callStackList.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;">Main thread</div>';
  } else {
    callStackList.innerHTML = stack.map((frame, idx) => `
      <div class="call-stack-frame ${idx === stack.length - 1 ? 'active' : ''}">
        <div class="frame-header">${escapeHtml(frame.functionName || 'unknown')}</div>
        <div class="frame-vars">
          ${Object.entries(frame.locals || {}).map(([k, v]) =>
            `<span class="frame-var">${escapeHtml(k)}=${escapeHtml(JSON.stringify(v))}</span>`
          ).join('')}
        </div>
      </div>
    `).join('');
  }
}

/* ============================================================
   SECTION 19: CANVAS SETUP & RESIZE
   ============================================================ */

const canvas = document.getElementById('vizCanvas');
const ctx = canvas.getContext('2d');
let canvasDPR = 1;

function resizeCanvas() {
  const container = document.getElementById('canvasContainer');
  canvasDPR = window.devicePixelRatio || 1;
  canvas.width = container.clientWidth * canvasDPR;
  canvas.height = container.clientHeight * canvasDPR;
  canvas.style.width = container.clientWidth + 'px';
  canvas.style.height = container.clientHeight + 'px';
  ctx.setTransform(canvasDPR, 0, 0, canvasDPR, 0, 0);
  drawCanvas();
}

function onResize() {
  resizeCanvas();
}

/**
 * Main canvas draw function.
 * Will be fully implemented in Part 3 with all renderers.
 */
function drawCanvas() {
  const w = canvas.width / canvasDPR;
  const h = canvas.height / canvasDPR;

  // Clear
  ctx.clearRect(0, 0, w, h);

  // Background
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-primary').trim();
  ctx.fillRect(0, 0, w, h);

  // Grid pattern (subtle)
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border-color').trim();
  ctx.lineWidth = 0.5;
  const gridSize = 40;
  ctx.beginPath();
  for (let x = 0; x < w; x += gridSize) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }
  for (let y = 0; y < h; y += gridSize) { ctx.moveTo(0, y); ctx.lineTo(w, y); }
  ctx.stroke();

  // If no steps, show welcome message
  if (!STATE.stepsGenerated || STATE.currentStepIndex < 0) {
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim();
    ctx.font = '600 16px ' + getComputedStyle(document.documentElement).getPropertyValue('--font-sans');
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Select an algorithm or write custom code to begin visualization', w / 2, h / 2);
    ctx.font = '400 13px ' + getComputedStyle(document.documentElement).getPropertyValue('--font-sans');
    ctx.fillText('Lafore Data Structures & Algorithms in Java — 2nd Edition', w / 2, h / 2 + 28);
    return;
  }

  // Visualization dispatch will be added in Part 3
  const step = STATE.steps[STATE.currentStepIndex];
  if (step && step.dataStructureSnapshot) {
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim();
    ctx.font = '500 14px ' + getComputedStyle(document.documentElement).getPropertyValue('--font-sans');
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`[Visualization for ${STATE.vizCategory || 'unknown'}]`, w / 2, h / 2);
    ctx.font = '400 12px ' + getComputedStyle(document.documentElement).getPropertyValue('--font-sans');
    ctx.fillText('Full canvas rendering engine coming in Part 3', w / 2, h / 2 + 24);
  }
}

/* ============================================================
   SECTION 20: STEP GENERATION WRAPPER
   ============================================================ */

/**
 * Generates steps for a preset algorithm and loads them into STATE.

    STATE.steps = [];
    STATE.totalSteps = 0;
    STATE.stepsGenerated = false;
    updateControlBarState();
    return;
  }

  try {
    STATE.steps = algo.generateSteps();
    STATE.totalSteps = STATE.steps.length;
    STATE.stepsGenerated = true;
    STATE.currentStepIndex = -1;
    updateControlBarState();
    showToast(`Generated ${STATE.totalSteps} execution steps`, 'success');
  } catch (err) {
    console.error('Step generation failed:', err);
    STATE.steps = [];
    STATE.totalSteps = 0;
    STATE.stepsGenerated = false;
    showToast('Failed to generate steps: ' + err.message, 'error');

  }

ALGORITHM_REGISTRY['binary-tree'] = {
  category: 'tree',
  javaCode:
`class Node {
    public int iData;        // data item (key)
    public double dData;     // data item
    public Node leftChild;   // this node's left child
    public Node rightChild;  // this node's right child

    public void displayNode() {
        System.out.print("{" + iData + ", " + dData + "} ");
    }
}

class Tree {
    private Node root;       // first node of tree

    public Tree() {
        root = null;         // no nodes in tree yet
    }

    public Node find(int key) {
        Node current = root; // start at root
        while (current.iData != key) {
            if (key < current.iData)
                current = current.leftChild;
            else
                current = current.rightChild;
            if (current == null)
                return null; // didn't find it
        }
        return current;      // found it
    }

    public void insert(int id, double dd) {
        Node newNode = new Node(); // make new node
        newNode.iData = id;        // insert data
        newNode.dData = dd;
        if (root == null)          // no node in root
            root = newNode;
        else {
            Node current = root;   // start at root
            Node parent;
            while (true) {
                parent = current;
                if (id < current.iData) {
                    current = current.leftChild;
                    if (current == null) {
                        parent.leftChild = newNode;
                        return;
                    }
                } else {
                    current = current.rightChild;
                    if (current == null) {
                        parent.rightChild = newNode;
                        return;
                    }
                }
            }
        }
    }

    public void inOrder(Node localRoot) {
        if (localRoot != null) {
            inOrder(localRoot.leftChild);
            localRoot.displayNode();
            inOrder(localRoot.rightChild);
        }
    }

    public void preOrder(Node localRoot) {
        if (localRoot != null) {
            localRoot.displayNode();
            preOrder(localRoot.leftChild);
            preOrder(localRoot.rightChild);
        }
    }

    public void postOrder(Node localRoot) {
        if (localRoot != null) {
            postOrder(localRoot.leftChild);
            postOrder(localRoot.rightChild);
            localRoot.displayNode();
        }
    }

    public Node minimum() {
        Node current = root;     // start at root
        Node last = null;
        while (current != null) {
            last = current;      // remember node
            current = current.leftChild;
        }
        return last;
    }

    public Node maximum() {
        Node current = root;     // start at root
        Node last = null;
        while (current != null) {
            last = current;      // remember node
            current = current.rightChild;
        }
        return last;
    }
}

class TreeApp {

  generateSteps: function() {
    const steps = [];
    let lineOffset = 0;

    // Helper to compute line number from the javaCode string position

    const codeLines = this.javaCode.split('\n');

    function addStep(lineNum, vars, ds, stack, desc) {
      steps.push({
        lineNumber: lineNum,
        variablesSnapshot: deepClone(vars),
        dataStructureSnapshot: deepClone(ds),
        callStackSnapshot: deepClone(stack),
        description: desc
      });
    }

    // Simulate building a binary tree with insertions
    // Data: insert sequence from main()
    const insertions = [
      { id: 50, dd: 1.5 },
      { id: 25, dd: 1.2 },
      { id: 75, dd: 1.7 },
      { id: 12, dd: 1.5 },
      { id: 37, dd: 1.2 },
      { id: 43, dd: 1.7 },
      { id: 30, dd: 1.5 },
      { id: 33, dd: 1.2 },
      { id: 87, dd: 1.7 },
      { id: 93, dd: 1.5 },
      { id: 97, dd: 1.5 }
    ];

    // Tree state representation
    let treeRoot = null;
    const nodes = {}; // id -> node object

    function makeNode(id, dd) {
      return { iData: id, dData: dd, leftChild: null, rightChild: null };
    }

    // --- Tree constructor ---
    addStep(23, {}, { root: null, nodes: {}, highlightedNode: null, operation: 'init' },
      [{ functionName: 'main', locals: {} }],
      'Tree constructor called: root set to null');

    // --- Insertions ---
    insertions.forEach((item, idx) => {
      const vars = { id: item.id, dd: item.dd };
      const stack = [{ functionName: 'insert', locals: { id: item.id, dd: item.dd } }];

      // Line 26: newNode creation
      addStep(26, vars, { root: treeRoot, nodes: deepClone(nodes), highlightedNode: null, operation: 'insert-start', insertingId: item.id },
        stack, `Creating new node with key ${item.id}`);

      // Line 27-28: assign data
      addStep(28, vars, { root: treeRoot, nodes: deepClone(nodes), highlightedNode: item.id, operation: 'insert-set-data' },
        stack, `Set iData=${item.id}, dData=${item.dd} on new node`);

      const newNode = makeNode(item.id, item.dd);
      nodes[item.id] = newNode;

      if (treeRoot === null) {
        // Line 29-30: root is null
        addStep(30, vars, { root: treeRoot, nodes: deepClone(nodes), highlightedNode: item.id, operation: 'insert-root-null' },
          stack, 'Tree is empty, new node becomes root');
        treeRoot = item.id;
        addStep(30, vars, { root: treeRoot, nodes: deepClone(nodes), highlightedNode: item.id, operation: 'insert-root-set' },
          stack, `Root now points to node ${item.id}`);
      } else {

        let current = treeRoot;
        let parent = null;
        let path = [];

        addStep(33, { ...vars, current: current }, { root: treeRoot, nodes: deepClone(nodes), highlightedNode: current, operation: 'insert-traverse', path: [] },
          stack, `Starting traversal from root (${current})`);

        while (true) {

          path.push(current);

          if (item.id < nodes[current].iData) {
            addStep(35, { ...vars, current: current, parent: parent }, { root: treeRoot, nodes: deepClone(nodes), highlightedNode: current, operation: 'insert-compare-left', path: [...path] },
              stack, `${item.id} < ${nodes[current].iData}, go to left child`);

            current = nodes[current].leftChild;
            if (current === null) {
              nodes[parent].leftChild = item.id;
              addStep(38, { ...vars, parent: parent }, { root: treeRoot, nodes: deepClone(nodes), highlightedNode: item.id, operation: 'insert-place-left', path: [...path], newLink: { from: parent, to: item.id, side: 'left' } },
                stack, `Left child is null: insert ${item.id} as left child of ${parent}`);

            } else {

                stack, `Moving to left child: node ${current}`);
            }

            current = nodes[current].rightChild;
            if (current === null) {
              nodes[parent].rightChild = item.id;
              addStep(43, { ...vars, parent: parent }, { root: treeRoot, nodes: deepClone(nodes), highlightedNode: item.id, operation: 'insert-place-right', path: [...path], newLink: { from: parent, to: item.id, side: 'right' } },
                stack, `Right child is null: insert ${item.id} as right child of ${parent}`);
              break;
            } else {
              addStep(41, { ...vars, current: current }, { root: treeRoot, nodes: deepClone(nodes), highlightedNode: current, operation: 'insert-traverse', path: [...path] },
                stack, `Moving to right child: node ${current}`);
            }

    });

    // --- Find operation ---
    const findKey = 25;
    addStep(54, { key: findKey }, { root: treeRoot, nodes: deepClone(nodes), highlightedNode: null, operation: 'find-start', targetKey: findKey },
      [{ functionName: 'find', locals: { key: findKey } }],

    let current = treeRoot;
    let found = null;
    let findPath = [];

    addStep(55, { key: findKey, current: current }, { root: treeRoot, nodes: deepClone(nodes), highlightedNode: current, operation: 'find-traverse', path: [] },
      [{ functionName: 'find', locals: { key: findKey, current: current } }],

    while (current !== null && nodes[current].iData !== findKey) {

          [{ functionName: 'find', locals: { key: findKey, current: current } }],

          [{ functionName: 'find', locals: { key: findKey, current: current } }],
          `${findKey} >= ${nodes[current].iData}, moving to right child`);

        current = nodes[current].rightChild;
      }

      if (current !== null) {
        addStep(55, { key: findKey, current: current }, { root: treeRoot, nodes: deepClone(nodes), highlightedNode: current, operation: 'find-traverse', path: [...findPath] },

    addStep(66, {}, { root: treeRoot, nodes: deepClone(nodes), highlightedNode: null, operation: 'inorder-start', traversalResult: [] },

      [{ functionName: 'postOrder', locals: { localRoot: treeRoot } }],

// ============================================================
// 2. HASH TABLE WITH SEPARATE CHAINING — Lafore Chapter 11
// ============================================================

ALGORITHM_REGISTRY['hash-table'] = {
  category: 'hash',
  javaCode:
`class Link {
    public int iData;        // data item
    public Link next;        // next link in list

    public Link(int it) {
        iData = it;
    }

    public void displayLink() {
        System.out.print(iData + " ");
    }
}

class SortedList {
    private Link first;      // ref to first list item

    public SortedList() {
        first = null;
    }

    public void insert(Link theLink) {
        int key = theLink.iData;
        Link previous = null;
        Link current = first;

        while (current != null && key > current.iData) {
            previous = current;
            current = current.next;
        }
        if (previous == null)
            first = theLink;
        else
            previous.next = theLink;
        theLink.next = current;
    }

    public void delete(int key) {
        Link previous = null;
        Link current = first;

        while (current != null && key != current.iData) {
            previous = current;
            current = current.next;
        }
        if (previous == null)
            first = first.next;
        else
            previous.next = current.next;
    }

    public Link find(int key) {
        Link current = first;
        while (current != null && current.iData <= key) {
            if (current.iData == key)
                return current;
            current = current.next;
        }
        return null;
    }

    public void displayList() {
        System.out.print("List (first-->last): ");
        Link current = first;
        while (current != null) {
            current.displayLink();
            current = current.next;
        }
        System.out.println();
    }
}

class HashTable {
    private SortedList[] hashArray;
    private int arraySize;

    public HashTable(int size) {
        arraySize = size;
        hashArray = new SortedList[arraySize];
        for (int j = 0; j < arraySize; j++)
            hashArray[j] = new SortedList();
    }

    public void displayTable() {
        for (int j = 0; j < arraySize; j++) {
            System.out.print(j + ". ");
            hashArray[j].displayList();
        }
    }

    public int hashFunc(int key) {
        return key % arraySize;
    }

    public void insert(Link theLink) {
        int key = theLink.iData;
        int hashVal = hashFunc(key);
        hashArray[hashVal].insert(theLink);
    }

    public void delete(int key) {
        int hashVal = hashFunc(key);
        hashArray[hashVal].delete(key);
    }

    public Link find(int key) {
        int hashVal = hashFunc(key);
        Link theLink = hashArray[hashVal].find(key);
        return theLink;
    }
}

          [{ functionName: 'SortedList.find', locals: { key: searchKey } }],

      addStep(53, { key: searchKey }, { arraySize: arraySize, buckets: deepClone(buckets), links: deepClone(links), operation: 'find-continue', searchKey: searchKey },

    for (let i = 0; i < delBucket.length; i++) {

  }

`class FactorialApp {
    public static void main(String[] args) {
        int theNumber = 5;
        int theAnswer = factorial(theNumber);
        System.out.println("Factorial=" + theAnswer);
    }

    public static long factorial(int n) {
        if (n == 0)
            return 1;
        else {
            long temp = n * factorial(n - 1);
            return temp;
        }
    }
}`,

  generateSteps: function() {
    const steps = [];
    const theNumber = 5;

    function addStep(lineNum, vars, ds, stack, desc) {
      steps.push({
        lineNumber: lineNum,
        variablesSnapshot: deepClone(vars),
        dataStructureSnapshot: deepClone(ds),
        callStackSnapshot: deepClone(stack),
        description: desc
      });
    }

    // Main
    addStep(3, { theNumber: theNumber }, { callTree: [], operation: 'main' },
      [{ functionName: 'main', locals: { theNumber: theNumber } }],
      `Main: theNumber = ${theNumber}`);

    addStep(4, { theNumber: theNumber }, { callTree: [], operation: 'call-factorial' },
      [{ functionName: 'main', locals: { theNumber: theNumber } }],
      `Calling factorial(${theNumber})`);

    // Recursive descent
    const callStack = [{ functionName: 'main', locals: { theNumber: theNumber } }];

    function buildFactorialSteps(n, depth) {
      const frame = { functionName: 'factorial', locals: { n: n, depth: depth } };
      const currentStack = [...callStack, frame];

      addStep(8, { n: n }, { callTree: currentStack.map(f => ({ ...f })), operation: 'factorial-enter', currentN: n, depth: depth },
        currentStack, `factorial(${n}): entering function, depth=${depth}`);

      if (n === 0) {
        addStep(9, { n: n }, { callTree: currentStack.map(f => ({ ...f })), operation: 'factorial-base', currentN: n, depth: depth, returnValue: 1 },
          currentStack, `factorial(${n}): base case reached, return 1`);

        frame.locals.returnValue = 1;
        return 1;
      } else {
        addStep(11, { n: n }, { callTree: currentStack.map(f => ({ ...f })), operation: 'factorial-recurse', currentN: n, depth: depth },
          currentStack, `factorial(${n}): n != 0, recurse with factorial(${n - 1})`);

        const subResult = buildFactorialSteps(n - 1, depth + 1);

        frame.locals.temp = n * subResult;
        frame.locals.returnValue = frame.locals.temp;

        addStep(12, { n: n, temp: frame.locals.temp }, { callTree: currentStack.map(f => ({ ...f })), operation: 'factorial-compute', currentN: n, depth: depth, subResult: subResult, result: frame.locals.temp },
          currentStack, `factorial(${n}): ${n} * factorial(${n - 1}) = ${n} * ${subResult} = ${frame.locals.temp}`);

        addStep(13, { n: n, temp: frame.locals.temp }, { callTree: currentStack.map(f => ({ ...f })), operation: 'factorial-return', currentN: n, depth: depth, returnValue: frame.locals.temp },
          currentStack, `factorial(${n}): returning ${frame.locals.temp}`);

        return frame.locals.temp;
      }
    }

    const finalAnswer = buildFactorialSteps(theNumber, 1);

    addStep(5, { theNumber: theNumber, theAnswer: finalAnswer }, { callTree: callStack, operation: 'main-result', result: finalAnswer },
      callStack, `Main: factorial(${theNumber}) = ${finalAnswer}`);

    return steps;
  }
};
