ALGORITHM_REGISTRY['merge-sort'] = {
  category: 'sort',
  javaCode:
`class DArray {
    private long[] theArray;
    private int nElems;

    public DArray(int max) {
        theArray = new long[max];
        nElems = 0;
    }

    public void insert(long value) {
        theArray[nElems] = value;
        nElems++;
    }

    public void display() {
        for (int j = 0; j < nElems; j++)
            System.out.print(theArray[j] + " ");
        System.out.println();
    }

    public void mergeSort() {
        long[] workSpace = new long[nElems];
        recMergeSort(workSpace, 0, nElems - 1);
    }

    private void recMergeSort(long[] workSpace, int lowerBound, int upperBound) {
        if (lowerBound == upperBound)
            return;
        else {
            int mid = (lowerBound + upperBound) / 2;

            recMergeSort(workSpace, lowerBound, mid);

            recMergeSort(workSpace, mid + 1, upperBound);

            merge(workSpace, lowerBound, mid + 1, upperBound);
        }
    }

    private void merge(long[] workSpace, int lowPtr, int highPtr, int upperBound) {
        int j = 0;
        int lowerBound = lowPtr;
        int mid = highPtr - 1;
        int n = upperBound - lowerBound + 1;

        while (lowPtr <= mid && highPtr <= upperBound) {
            if (theArray[lowPtr] < theArray[highPtr])
                workSpace[j++] = theArray[lowPtr++];
            else
                workSpace[j++] = theArray[highPtr++];
        }

        while (lowPtr <= mid)
            workSpace[j++] = theArray[lowPtr++];

        while (highPtr <= upperBound)
            workSpace[j++] = theArray[highPtr++];

        for (j = 0; j < n; j++)
            theArray[lowerBound + j] = workSpace[j];
    }
}

  };

  function loadThemeColors() {
    const style = getComputedStyle(document.documentElement);
    const get = (name, fallback) => style.getPropertyValue(name).trim() || fallback;
    VIZ.colors.bgPrimary       = get('--bg-primary', '#0b0b10');
    VIZ.colors.bgSecondary     = get('--bg-secondary', '#14141c');
    VIZ.colors.bgTertiary      = get('--bg-tertiary', '#1e1e2a');
    VIZ.colors.textPrimary     = get('--text-primary', '#f0f0f5');
    VIZ.colors.textSecondary   = get('--text-secondary', '#a0a0b8');
    VIZ.colors.textMuted       = get('--text-muted', '#6e6e8a');
    VIZ.colors.accent          = get('--accent', '#00e5ff');
    VIZ.colors.secondaryAccent = get('--secondary-accent', '#ff9100');
    VIZ.colors.success         = get('--success', '#00e676');
    VIZ.colors.warning         = get('--warning', '#ffea00');
    VIZ.colors.danger          = get('--danger', '#ff1744');
    VIZ.colors.border          = get('--border-color', 'rgba(255,255,255,0.06)');
  }

  /* ----------------------------------------------------------
     2. PARTICLE SYSTEM
     ---------------------------------------------------------- */
  const particles = [];

  class Particle {
    constructor(x, y, vx, vy, color, life, size) {
      this.x = x; this.y = y;
      this.vx = vx; this.vy = vy;
      this.color = color;
      this.life = life;
      this.maxLife = life;
      this.size = size;
    }
    update(dt) {
      this.x += this.vx * dt * 0.06;
      this.y += this.vy * dt * 0.06;
      this.vy += 0.015 * dt;
      this.life -= dt;
      this.size *= 0.995;
    }
    draw(ctx) {
      const a = Math.max(0, this.life / this.maxLife);
      ctx.globalAlpha = a;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = 1.2 + Math.random() * 3;
      particles.push(new Particle(
        x, y,
        Math.cos(ang) * spd,
        Math.sin(ang) * spd,
        color,
        500 + Math.random() * 400,
        2 + Math.random() * 3
      ));
    }
  }

  function updateAndDrawParticles(ctx, dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.update(dt);
      p.draw(ctx);
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  /* ----------------------------------------------------------
     3. ANIMATION STATE
     ---------------------------------------------------------- */
  const vizState = {
    prevStepIndex: -2,
    animStart: 0,
    animProgress: 1,
    lastSpawnStep: -1
  };

  /* ----------------------------------------------------------
     4. DRAW HELPERS
     ---------------------------------------------------------- */
  function drawText(ctx, text, x, y, opts = {}) {
    ctx.font = opts.font || '600 13px sans-serif';
    ctx.textAlign = opts.align || 'center';
    ctx.textBaseline = opts.baseline || 'middle';
    ctx.fillStyle = opts.color || VIZ.colors.textPrimary;
    if (opts.shadow) {
      ctx.shadowColor = opts.shadow;
      ctx.shadowBlur = 12;
    }
    ctx.fillText(text, x, y);
    ctx.shadowBlur = 0;
  }

  function drawRoundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  /* ----------------------------------------------------------
     5. TREE RENDERER (Binary Tree)
     ---------------------------------------------------------- */
  function layoutTree(nodes, rootId, width, height) {
    const layout = {};
    if (!rootId || !nodes[rootId]) return layout;

    // BFS to collect levels
    const levels = [];
    let queue = [{ id: rootId }];
    while (queue.length) {
      const level = [];
      const next = [];
      queue.forEach(item => {
        const n = nodes[item.id];
        level.push(item.id);
        if (n && n.leftChild) next.push({ id: n.leftChild });
        if (n && n.rightChild) next.push({ id: n.rightChild });
      });
      levels.push(level);
      queue = next;
    }

    const marginX = 50;
    const marginY = 70;
    const availW = width - marginX * 2;
    const availH = height - marginY * 2 - 40;
    const levelH = availH / Math.max(1, levels.length);

    levels.forEach((level, d) => {
      const count = level.length;
      const y = marginY + d * levelH + levelH / 2;
      level.forEach((id, i) => {
        const x = marginX + ((i + 0.5) / count) * availW;
        layout[id] = { x, y };
      });
    });

    return layout;
  }

  function renderTree(ctx, ds, w, h, t) {
    const { root, nodes, highlightedNode, operation, insertingId, newLink } = ds;
    if (!root || !nodes) return;

    const layout = layoutTree(nodes, root, w, h);
    const r = VIZ.nodeRadius;

    // Edges
    Object.entries(nodes).forEach(([id, node]) => {
      const pos = layout[id];
      if (!pos) return;
      ['leftChild', 'rightChild'].forEach(side => {
        const cid = node[side];
        if (cid && layout[cid]) {
          const c = layout[cid];
          ctx.beginPath();
          ctx.moveTo(pos.x, pos.y + r);
          const cy = (pos.y + c.y) / 2;
          ctx.bezierCurveTo(pos.x, cy, c.x, cy, c.x, c.y - r);
          ctx.strokeStyle = VIZ.colors.textMuted + '88';
          ctx.lineWidth = 2;
          ctx.stroke();

          if (newLink && newLink.from === id && newLink.to === cid) {
            ctx.strokeStyle = VIZ.colors.accent;
            ctx.lineWidth = 3;
            ctx.shadowColor = VIZ.colors.accent;
            ctx.shadowBlur = 12;
            ctx.stroke();
            ctx.shadowBlur = 0;
          }
        }
      });
    });

    // Nodes
    Object.entries(layout).forEach(([id, pos]) => {
      const node = nodes[id];
      const isHL = String(highlightedNode) === String(id);
      const isIns = String(insertingId) === String(id);
      const isRoot = String(root) === String(id);
      let radius = r;
      if (isHL) radius += Math.sin(performance.now() / 180) * 3;

      // Glow ring
      if (isHL || isIns) {
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, radius + 6, 0, Math.PI * 2);
        ctx.fillStyle = (isHL ? VIZ.colors.accent : VIZ.colors.secondaryAccent) + '18';
        ctx.fill();
      }

      // Main circle
      drawRoundRect(ctx, pos.x - radius, pos.y - radius, radius * 2, radius * 2, radius);
      ctx.fillStyle = isHL ? VIZ.colors.accent + '22' : (isIns ? VIZ.colors.secondaryAccent + '18' : VIZ.colors.bgTertiary);
      ctx.fill();
      ctx.strokeStyle = isHL ? VIZ.colors.accent : (isIns ? VIZ.colors.secondaryAccent : VIZ.colors.textMuted + 'aa');
      ctx.lineWidth = isHL ? 3 : 1.5;
      if (isHL) { ctx.shadowColor = VIZ.colors.accent; ctx.shadowBlur = 14; }
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Inner fill
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius - 2, 0, Math.PI * 2);
      ctx.fillStyle = VIZ.colors.bgSecondary;
      ctx.fill();

      // Data
      drawText(ctx, String(node.iData), pos.x, pos.y - 5, {
        color: isHL ? VIZ.colors.accent : VIZ.colors.textPrimary,
        font: '700 15px sans-serif'
      });
      drawText(ctx, String(node.dData), pos.x, pos.y + 10, {
        color: VIZ.colors.textSecondary,
        font: '500 10px sans-serif'
      });

      if (isRoot) {
        drawText(ctx, 'ROOT', pos.x, pos.y - radius - 12, { color: VIZ.colors.accent, font: '700 9px sans-serif' });
      }
    });

    if (operation) {
      drawText(ctx, operation.replace(/-/g, ' ').toUpperCase(), w / 2, 30, {
        color: VIZ.colors.accent, font: '700 16px sans-serif', shadow: VIZ.colors.accent + '55'
      });
    }
  }

  /* ----------------------------------------------------------
     6. SORTING RENDERERS
     ---------------------------------------------------------- */
  function renderSort(ctx, ds, w, h, t) {
    const { array, operation, gap, pivotIndex, pivotValue, mergeRange, partitionRange, swappedIndices, workSpace, buckets, exp, pass } = ds;
    if (!array || !array.length) return;

    if (operation && operation.includes('radix')) {
      renderRadix(ctx, ds, w, h);
      return;
    }

    const margin = 40;
    const availW = w - margin * 2;
    const baseY = h - margin - 20;
    const count = array.length;
    const barGap = 3;
    const barW = (availW - barGap * (count - 1)) / count;
    const maxVal = Math.max(...array.filter(v => v !== null), 1);
    const availH = h - margin * 2 - 60;

    // Bars
    array.forEach((val, i) => {
      if (val === null) return;
      const bh = (val / maxVal) * availH * 0.9;
      const x = margin + i * (barW + barGap);
      const y = baseY - bh;

      let color = VIZ.colors.accent;
      let glow = false;

      if (pivotIndex === i) { color = VIZ.colors.secondaryAccent; glow = true; }
      else if (swappedIndices && swappedIndices.includes(i)) { color = VIZ.colors.danger; glow = true; }
      else if (mergeRange && i >= mergeRange[0] && i <= mergeRange[1]) { color = VIZ.colors.warning; }
      else if (partitionRange && i >= partitionRange[0] && i <= partitionRange[1]) { color = VIZ.colors.warning; }
      else if (operation && operation.includes('sorted')) { color = VIZ.colors.success; }

      ctx.fillStyle = color;
      if (glow) { ctx.shadowColor = color; ctx.shadowBlur = 16; }

      drawRoundRect(ctx, x, y, barW, bh, 3);
      ctx.fill();
      ctx.shadowBlur = 0;

      if (barW > 18) {
        drawText(ctx, String(val), x + barW / 2, y - 8, { color: VIZ.colors.textSecondary, font: '500 10px sans-serif' });
      }
      drawText(ctx, String(i), x + barW / 2, baseY + 12, { color: VIZ.colors.textMuted, font: '500 10px sans-serif' });
    });

    // Workspace for merge sort
    if (workSpace && workSpace.length && mergeRange) {
      const wsY = margin + 10;
      const wsW = barW * 0.75;
      drawText(ctx, 'WORKSPACE', w / 2, wsY - 6, { color: VIZ.colors.textMuted, font: '600 10px sans-serif' });
      workSpace.forEach((val, i) => {
        if (val === null || val === undefined || val === 0) return;
        const wx = margin + (mergeRange[0] + i) * (barW + barGap) + (barW - wsW) / 2;
        ctx.fillStyle = VIZ.colors.accent + '33';
        ctx.fillRect(wx, wsY, wsW, 18);
        ctx.strokeStyle = VIZ.colors.accent + 'aa';
        ctx.strokeRect(wx, wsY, wsW, 18);
        drawText(ctx, String(val), wx + wsW / 2, wsY + 9, { color: VIZ.colors.accent, font: '500 9px sans-serif' });
      });
    }

    // Overlay info
    if (gap !== undefined) {
      drawText(ctx, `SHELL SORT — GAP h = ${gap}`, w / 2, 28, { color: VIZ.colors.warning, font: '700 16px sans-serif', shadow: VIZ.colors.warning + '55' });
    } else if (pivotValue !== undefined) {
      drawText(ctx, `QUICK SORT — PIVOT = ${pivotValue}`, w / 2, 28, { color: VIZ.colors.secondaryAccent, font: '700 16px sans-serif', shadow: VIZ.colors.secondaryAccent + '55' });
    } else if (operation && operation.includes('merge')) {
      drawText(ctx, 'MERGE SORT', w / 2, 28, { color: VIZ.colors.accent, font: '700 16px sans-serif', shadow: VIZ.colors.accent + '55' });
    }

    // Particles on swap
    if (swappedIndices && vizState.lastSpawnStep !== STATE.currentStepIndex && t < 0.15) {
      swappedIndices.forEach(idx => {
        const x = margin + idx * (barW + barGap) + barW / 2;
        spawnParticles(x, baseY - 20, VIZ.colors.danger, 6);
      });
      vizState.lastSpawnStep = STATE.currentStepIndex;
    }
  }

  function renderRadix(ctx, ds, w, h) {
    const { array, buckets, exp, pass } = ds;
    if (!array) return;

    const margin = 40;
    const barCount = array.length;
    const barGap = 6;
    const barW = Math.min(48, (w - margin * 2 - barGap * (barCount - 1)) / barCount);
    const totalW = barCount * (barW + barGap) - barGap;
    const startX = (w - totalW) / 2;
    const arrY = margin + 50;
    const maxVal = Math.max(...array, 1);

    // Title
    drawText(ctx, `RADIX SORT — Pass ${pass || 1}  (exp = ${exp || 1})`, w / 2, 28, {
      color: VIZ.colors.accent, font: '700 18px sans-serif', shadow: VIZ.colors.accent + '55'
    });

    // Array bars with digit highlight
    array.forEach((val, i) => {
      const bh = (val / maxVal) * 100;
      const x = startX + i * (barW + barGap);
      const y = arrY + 100 - bh;

      ctx.fillStyle = VIZ.colors.accent;
      drawRoundRect(ctx, x, y, barW, bh, 3);
      ctx.fill();

      const digit = Math.floor(val / (exp || 1)) % 10;
      drawText(ctx, String(digit), x + barW / 2, arrY + 118, { color: VIZ.colors.warning, font: '700 14px sans-serif' });
      drawText(ctx, String(val), x + barW / 2, y - 8, { color: VIZ.colors.textSecondary, font: '500 10px sans-serif' });
    });

    // Buckets
    const bucketY = h - margin - 110;
    const bucketW = (w - margin * 2) / 10;
    const bucketH = 90;

    for (let b = 0; b < 10; b++) {
      const bx = margin + b * bucketW;
      ctx.fillStyle = VIZ.colors.bgTertiary;
      drawRoundRect(ctx, bx + 2, bucketY, bucketW - 4, bucketH, 4);
      ctx.fill();
      ctx.strokeStyle = VIZ.colors.textMuted + '55';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx + 2, bucketY, bucketW - 4, bucketH);

      drawText(ctx, String(b), bx + bucketW / 2, bucketY + bucketH + 14, { color: VIZ.colors.textPrimary, font: '700 14px sans-serif' });

      if (buckets && buckets[b]) {
        buckets[b].forEach((val, idx) => {
          const by = bucketY + bucketH - 18 - idx * 16;
          ctx.fillStyle = VIZ.colors.accent + '44';
          ctx.fillRect(bx + 6, by, bucketW - 12, 14);
          drawText(ctx, String(val), bx + bucketW / 2, by + 7, { color: VIZ.colors.textPrimary, font: '500 10px sans-serif' });
        });
      }
    }
  }

  /* ----------------------------------------------------------
     7. ARRAY-BASED STRUCTURES (Stack, Queue, Deque)
     ---------------------------------------------------------- */
  function renderArrayStruct(ctx, ds, w, h, type) {
    let arr, ptrs, ptrNames, ptrColors;
    if (type === 'stack') {
      arr = ds.stackArray || [];
      ptrs = [ds.top]; ptrNames = ['top']; ptrColors = [VIZ.colors.accent];
    } else if (type === 'queue') {
      arr = ds.queArray || [];
      ptrs = [ds.front, ds.rear]; ptrNames = ['front', 'rear']; ptrColors = [VIZ.colors.success, VIZ.colors.danger];
    } else {
      arr = ds.dequeArray || [];
      ptrs = [ds.left, ds.right]; ptrNames = ['left', 'right']; ptrColors = [VIZ.colors.success, VIZ.colors.danger];
    }
    if (!arr || !arr.length) return;

    const count = arr.length;
    const boxSize = Math.min(56, (w - 80) / count);
    const totalW = count * boxSize;
    const startX = (w - totalW) / 2;
    const cy = h / 2;

    arr.forEach((val, i) => {
      const x = startX + i * boxSize;
      const y = cy - boxSize / 2;
      const empty = val === null || val === undefined;

      ctx.fillStyle = empty ? VIZ.colors.bgSecondary : VIZ.colors.bgTertiary;
      drawRoundRect(ctx, x + 1, y + 1, boxSize - 2, boxSize - 2, 4);
      ctx.fill();

      let border = VIZ.colors.textMuted + '88';
      let lw = 1;
      if (ptrs.includes(i)) { border = VIZ.colors.accent; lw = 2; }
      ctx.strokeStyle = border;
      ctx.lineWidth = lw;
      ctx.strokeRect(x + 1, y + 1, boxSize - 2, boxSize - 2);

      if (!empty) {
        drawText(ctx, String(val), x + boxSize / 2, y + boxSize / 2, { color: VIZ.colors.textPrimary, font: '700 15px sans-serif' });
      }
      drawText(ctx, String(i), x + boxSize / 2, y + boxSize + 14, { color: VIZ.colors.textMuted, font: '500 10px sans-serif' });
    });

    // Pointers
    ptrs.forEach((p, idx) => {
      if (p === null || p === undefined || p < 0 || p >= count) return;
      const x = startX + p * boxSize + boxSize / 2;
      const y = cy - boxSize / 2 - 28;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x, cy - boxSize / 2 - 4);
      ctx.strokeStyle = ptrColors[idx];
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x - 4, cy - boxSize / 2 - 4);
      ctx.lineTo(x, cy - boxSize / 2);
      ctx.lineTo(x + 4, cy - boxSize / 2 - 4);
      ctx.fillStyle = ptrColors[idx];
      ctx.fill();

      drawText(ctx, ptrNames[idx].toUpperCase(), x, y - 6, { color: ptrColors[idx], font: '700 10px sans-serif' });
    });

    if (ds.operation) {
      drawText(ctx, ds.operation.replace(/-/g, ' ').toUpperCase(), w / 2, 36, {
        color: VIZ.colors.accent, font: '700 15px sans-serif', shadow: VIZ.colors.accent + '55'
      });
    }
  }

  /* ----------------------------------------------------------
     8. LINKED LIST RENDERER
     ---------------------------------------------------------- */
  function renderList(ctx, ds, w, h, type) {
    const { first, last, links, forward, operation, newLink, deletedLink } = ds;
    if (!links || !forward) return;

    const nodeW = VIZ.listNodeW;
    const nodeH = VIZ.listNodeH;
    const gap = 48;
    const totalW = forward.length * (nodeW + gap) - gap;
    const startX = Math.max(30, (w - totalW) / 2);
    const cy = h / 2;

    // Connections
    forward.forEach((id, i) => {
      if (i >= forward.length - 1) return;
      const nid = forward[i + 1];
      const x1 = startX + i * (nodeW + gap) + nodeW;
      const y1 = cy;
      const x2 = startX + (i + 1) * (nodeW + gap);
      const y2 = cy;

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2 - 6, y2);
      ctx.strokeStyle = VIZ.colors.accent + 'cc';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x2 - 6, y2 - 4);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x2 - 6, y2 + 4);
      ctx.fillStyle = VIZ.colors.accent;
      ctx.fill();

      if (type === 'doubly-linked' || type === 'deque-linked') {
        ctx.beginPath();
        ctx.moveTo(x2, y2 + 10);
        ctx.lineTo(x1 + 6, y1 + 10);
        ctx.strokeStyle = VIZ.colors.textSecondary + 'aa';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x1 + 6, y1 + 6);
        ctx.lineTo(x1, y1 + 10);
        ctx.lineTo(x1 + 6, y1 + 14);
        ctx.fillStyle = VIZ.colors.textSecondary;
        ctx.fill();
      }
    });

    // Nodes
    forward.forEach((id, i) => {
      const x = startX + i * (nodeW + gap);
      const y = cy - nodeH / 2;
      const link = links[id];
      const isNew = newLink === id;
      const isDel = deletedLink === id;
      const isFirst = String(first) === String(id);
      const isLast = String(last) === String(id);

      ctx.fillStyle = isDel ? VIZ.colors.danger + '18' : (isNew ? VIZ.colors.success + '18' : VIZ.colors.bgTertiary);
      drawRoundRect(ctx, x, y, nodeW, nodeH, 6);
      ctx.fill();

      ctx.strokeStyle = isNew ? VIZ.colors.success : (isDel ? VIZ.colors.danger : VIZ.colors.textMuted + 'aa');
      ctx.lineWidth = isNew || isDel ? 2 : 1;
      if (isNew || isDel) { ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 10; }
      ctx.strokeRect(x, y, nodeW, nodeH);
      ctx.shadowBlur = 0;

      const txt = link.iData !== undefined ? `{${link.iData},${link.dData}}` : String(link.dData);
      drawText(ctx, txt, x + nodeW / 2, y + nodeH / 2, { color: isDel ? VIZ.colors.danger : VIZ.colors.textPrimary, font: '600 12px sans-serif' });

      if (isFirst) drawText(ctx, 'FIRST', x + nodeW / 2, y - 10, { color: VIZ.colors.success, font: '700 9px sans-serif' });
      if (isLast && (type === 'doubly-linked' || type === 'deque-linked')) {
        drawText(ctx, 'LAST', x + nodeW / 2, y + nodeH + 10, { color: VIZ.colors.danger, font: '700 9px sans-serif' });
      }
    });

    if (operation) {
      drawText(ctx, operation.replace(/-/g, ' ').toUpperCase(), w / 2, 36, {
        color: VIZ.colors.accent, font: '700 15px sans-serif', shadow: VIZ.colors.accent + '55'
      });
    }
  }

  /* ----------------------------------------------------------
     9. HASH TABLE RENDERER
     ---------------------------------------------------------- */
  function renderHash(ctx, ds, w, h) {
    const { arraySize, buckets, links, operation, insertingKey, targetBucket, hashVal, searchKey, deleteKey } = ds;
    if (!buckets || !links) return;

    const bucketH = 36;
    const startX = 50;
    const startY = 70;
    const chainGap = 72;

    drawText(ctx, 'HASH TABLE — SEPARATE CHAINING', w / 2, 32, {
      color: VIZ.colors.accent, font: '700 18px sans-serif', shadow: VIZ.colors.accent + '55'
    });

    buckets.forEach((bucket, i) => {
      const y = startY + i * (bucketH + 8);
      const isTarget = targetBucket === i || hashVal === i;

      ctx.fillStyle = VIZ.colors.bgTertiary;
      drawRoundRect(ctx, startX, y, 46, bucketH, 4);
      ctx.fill();
      ctx.strokeStyle = isTarget ? VIZ.colors.accent : VIZ.colors.textMuted + '88';
      ctx.lineWidth = isTarget ? 2 : 1;
      ctx.strokeRect(startX, y, 46, bucketH);

      drawText(ctx, String(i), startX + 23, y + bucketH / 2, { color: isTarget ? VIZ.colors.accent : VIZ.colors.textPrimary, font: '700 13px sans-serif' });

      let cx = startX + 60;
      bucket.forEach((linkId, idx) => {
        const link = links[linkId];
        if (idx === 0) {
          ctx.beginPath(); ctx.moveTo(startX + 46, y + bucketH / 2); ctx.lineTo(cx - 4, y + bucketH / 2);
          ctx.strokeStyle = VIZ.colors.accent; ctx.lineWidth = 2; ctx.stroke();
        } else {
          ctx.beginPath(); ctx.moveTo(cx - chainGap + 44, y + bucketH / 2); ctx.lineTo(cx - 4, y + bucketH / 2);
          ctx.strokeStyle = VIZ.colors.accent; ctx.lineWidth = 2; ctx.stroke();
        }

        const isMatch = (insertingKey === link.iData) || (searchKey === link.iData) || (deleteKey === link.iData);
        ctx.fillStyle = isMatch ? VIZ.colors.accent + '22' : VIZ.colors.bgTertiary;
        drawRoundRect(ctx, cx, y + 3, 56, bucketH - 6, 4);
        ctx.fill();

    const cat = STATE.vizCategory;

      ctx.fill();

           addStep(stmt.line, `Loop iteration ${iter}`, { vars: deepClone(vars), arrays: deepClone(arrays), operation: 'loop-iter', loopType: 'for' });
         }
         break;
       }
       case 'WhileLoop': {
         let iter = 0;
         const MAX_ITER = 1000;
         while (iter++ < MAX_ITER) {
           const cond = evalExpr(stmt.cond, vars, arrays);
           if (!cond) break;
           if (stmt.body) {
             if (stmt.body.type === 'Block') {
               stmt.body.statements.forEach(s => executeStatement(s, depth + 1));
             } else {
               executeStatement(stmt.body, depth + 1);
             }
           }
           addStep(stmt.line, `While loop iteration ${iter}`, { vars: deepClone(vars), arrays: deepClone(arrays), operation: 'loop-iter', loopType: 'while' });
         }
         break;
       }
       case 'If': {
         const cond = evalExpr(stmt.cond, vars, arrays);
         addStep(stmt.line, `if (${cond})`, { vars: deepClone(vars), arrays: deepClone(arrays), operation: 'if', condition: cond });
         if (cond) {
           if (stmt.thenBody) {
             if (stmt.thenBody.type === 'Block') {
               stmt.thenBody.statements.forEach(s => executeStatement(s, depth + 1));
             } else {
               executeStatement(stmt.thenBody, depth + 1);
             }
           }
         } else if (stmt.elseBody) {
           if (stmt.elseBody.type === 'Block') {
             stmt.elseBody.statements.forEach(s => executeStatement(s, depth + 1));
           } else {
             executeStatement(stmt.elseBody, depth + 1);
           }
         }
         break;
       }
       case 'Call': {
         const argVals = (stmt.args || []).map(a => evalExpr(a, vars, arrays));
         addStep(stmt.line, `Call ${stmt.name}(${argVals.join(', ')})`, { vars: deepClone(vars), arrays: deepClone(arrays), operation: 'call', funcName: stmt.name });
         break;
       }
       case 'Return': {
         const val = evalExpr(stmt.expr, vars, arrays);
         addStep(stmt.line, `return ${val}`, { vars: deepClone(vars), arrays: deepClone(arrays), operation: 'return', returnValue: val });
         break;
       }
       case 'Block': {
         stmt.statements.forEach(s => executeStatement(s, depth + 1));
         break;
       }
     }
   }

   ast.statements.forEach(s => executeStatement(s));

   return steps;
 }

 /**
  * Main entry: parse custom code and generate steps.
  */
 function parseAndGenerateSteps(code, input) {
   const tokens = tokenizeJava(code);
   const { ast, errors } = parseTokens(tokens);
   if (errors.length > 0) {
     return { success: false, errors, steps: [] };
   }
   const steps = executeAST(ast, input);
   return { success: true, errors: [], steps };
 }

 /**
  * Detect and fix common Java syntax errors while preserving
  * the original algorithmic intent.
  */
 function aiFixEngine(code) {
   let fixed = code;
   let corrections = 0;
   const lines = fixed.split('\n');
   const correctedLines = new Set();

   // Rule 1: Missing semicolons after statements
   for (let i = 0; i < lines.length; i++) {
     const trimmed = lines[i].trim();
     if (!trimmed || trimmed.startsWith('//') || trimmed.startsWith('/*') || trimmed.startsWith('*')) continue;
     if (/^[a-zA-Z_][a-zA-Z0-9_]*\s*=/.test(trimmed) && !trimmed.endsWith(';') && !trimmed.endsWith('{')) {
       lines[i] = lines[i] + ';';
       correctedLines.add(i);
       corrections++;
     }
     if (/^(int|long|double|float|boolean|char|byte|short)\s+/.test(trimmed) && !trimmed.endsWith(';') && !trimmed.endsWith('{')) {
       lines[i] = lines[i] + ';';
       correctedLines.add(i);
       corrections++;
     }
   }

   // Rule 2: Fix common typos in keywords
   const keywordFixes = {
     'puclic': 'public', 'publc': 'public', 'pubic': 'public',
     'privte': 'private', 'prvate': 'private',
     'sttic': 'static', 'statc': 'static',
     'clas': 'class', 'clss': 'class',
     'viod': 'void', 'vod': 'void',
     'itn': 'int', 'nit': 'int',
     'retrun': 'return', 'retun': 'return', 'retrn': 'return',
     'systme': 'System', 'sytem': 'System',
     'prinln': 'println', 'prntln': 'println',
     'mainn': 'main', 'maim': 'main'
   };
   for (const [bad, good] of Object.entries(keywordFixes)) {
     const regex = new RegExp('\\b' + bad + '\\b', 'g');
     if (regex.test(fixed)) {
       for (let i = 0; i < lines.length; i++) {
         if (regex.test(lines[i])) {
           lines[i] = lines[i].replace(regex, good);
           correctedLines.add(i);
           corrections++;
         }
       }
     }
   }

   // Rule 3: Unmatched braces detection
   let braceCount = 0;
   for (let i = 0; i < lines.length; i++) {
     for (const ch of lines[i]) {
       if (ch === '{') braceCount++;
       if (ch === '}') braceCount--;
     }
   }
   if (braceCount > 0) {
     lines.push('}'.repeat(braceCount));
     correctedLines.add(lines.length - 1);
     corrections++;
   }

   // Rule 4: Missing class wrapper
   const hasClass = /\bclass\b/.test(fixed);
   if (!hasClass && lines.some(l => /^\s*(int|long|double|void|boolean)\s+\w+\s*\(/.test(l))) {
     // Wrap in a class
     const indent = '    ';
     const wrapped = ['public class CustomCode {', '    public static void main(String[] args) {'];
     lines.forEach(l => wrapped.push(indent + l));
     wrapped.push('    }', '}');
     lines.length = 0;
     lines.push(...wrapped);
     correctedLines.add(0);
     correctedLines.add(1);
     corrections++;
   }

   // Rule 5: String concatenation with + missing quotes
   for (let i = 0; i < lines.length; i++) {
     if (/System\.out\.print/.test(lines[i]) && /\+/.test(lines[i])) {
       // Ensure variables in println are properly concatenated
       const match = lines[i].match(/System\.out\.println\((.+)\);?/);
       if (match && !match[1].includes('"')) {
         lines[i] = lines[i].replace(/System\.out\.println\((.+)\)/, 'System.out.println("$1 = " + $1)');
         correctedLines.add(i);
         corrections++;
       }
     }
   }

   // Rule 6: Array initialization shorthand
   for (let i = 0; i < lines.length; i++) {
     if (/=\s*\{/.test(lines[i]) && !lines[i].includes('new')) {
       const m = lines[i].match(/(int|long|double|float)\[\]\s+(\w+)\s*=\s*\{(.+)\}/);
       if (m) {
         const vals = m[3].split(',').length;
         lines[i] = `${m[1]}[] ${m[2]} = new ${m[1]}[]{${m[3]}};`;
         correctedLines.add(i);
         corrections++;
       }
     }
   }

   // Rule 7: Missing parentheses in for/while/if
   for (let i = 0; i < lines.length; i++) {
     const trimmed = lines[i].trim();
     if (/^\s*for\s+\w+/.test(trimmed) && !/\(/.test(trimmed)) {
       lines[i] = lines[i].replace(/for\s+/, 'for (') + ') {';
       correctedLines.add(i);
       corrections++;
     }
     if (/^\s*while\s+\w+/.test(trimmed) && !/\(/.test(trimmed)) {
       lines[i] = lines[i].replace(/while\s+/, 'while (') + ') {';
       correctedLines.add(i);
       corrections++;
     }
     if (/^\s*if\s+\w+/.test(trimmed) && !/\(/.test(trimmed)) {
       lines[i] = lines[i].replace(/if\s+/, 'if (') + ') {';
       correctedLines.add(i);
       corrections++;
     }
   }

   fixed = lines.join('\n');
   return { code: fixed, corrections, correctedLines: Array.from(correctedLines) };
 }

 /**
  * Normalize variable names to Lafore conventions.
  */
 function normalizeToLafore(code) {
   let normalized = code;
   const replacements = {
     '\\bindex\\b': 'j', '\\bidx\\b': 'j', '\\bi\\b': 'j',
     '\\bcount\\b': 'nElems', '\\blength\\b': 'maxSize',
     '\\bsize\\b': 'nElems', '\\bdata\\b': 'dData',
     '\\bvalue\\b': 'dd', '\\bval\\b': 'dd',
     '\\bkey\\b': 'iData', '\\bitem\\b': 'iData',
     '\\bhead\\b': 'first', '\\btail\\b': 'last',
     '\\bstart\\b': 'front', '\\bend\\b': 'rear',
     '\\bcurrentNode\\b': 'current', '\\bcurr\\b': 'current',
     '\\bprevNode\\b': 'previous', '\\bprev\\b': 'previous',
     '\\bnextNode\\b': 'next', '\\bnewNode\\b': 'newLink',
     '\\btempNode\\b': 'temp', '\\bresult\\b': 'theAnswer'
   };
   for (const [pattern, replacement] of Object.entries(replacements)) {
     const regex = new RegExp(pattern, 'g');
     normalized = normalized.replace(regex, replacement);
   }
   return normalized;
 }

 window.aiFixCode = function() {

 /**
  * Auto-detect which data structure the user's code manipulates.
  */
 function detectDataStructure(code) {
   const lower = code.toLowerCase();
   if (/\b(binarytree|tree|node.*left|node.*right|leftchild|rightchild)\b/.test(lower)) return 'tree';
   if (/\b(mergesort|quicksort|shellsort|radixsort|bubblesort|selectionsort|insertionsort)\b/.test(lower)) return 'sort';
   if (/\b(stack|push|pop|peek|top)\b/.test(lower) && !/\blinked\b/.test(lower)) return 'stack';
   if (/\b(queue|enqueue|dequeue|front|rear|circular)\b/.test(lower) && !/\blinked\b/.test(lower)) return 'queue';
   if (/\b(deque|insertleft|insertright|removeleft|removeright)\b/.test(lower)) return 'deque';
   if (/\b(linkedlist|singlylinked|doublylinked|next.*previous|previous.*next)\b/.test(lower)) return 'list';
   if (/\b(hashtable|hashmap|hash.*chain|bucket|collision)\b/.test(lower)) return 'hash';
   if (/\b(recursion|recursive|factorial|fibonacci)\b/.test(lower)) return 'recursion';
   if (/\b(array|arr\[|for.*int.*=.*0)\b/.test(lower)) return 'sort';
   return 'generic';
 }

 window.drawCanvas = function(timestamp) {

     return;
   }

     ctx.clearRect(0, 0, w, h);

     });

     // Draw variables table
     const vars = ds.vars || step.variablesSnapshot || {};
     const varEntries = Object.entries(vars);
     if (varEntries.length > 0) {
       const startY = 80;
       const rowH = 36;
       const colW = 160;
       const startX = (w - Math.min(varEntries.length, 6) * colW) / 2;

       varEntries.slice(0, 12).forEach(([name, val], i) => {

         const row = Math.floor(i / 6);
         const x = startX + col * colW;
         const y = startY + row * (rowH + 8);

         ctx.fillStyle = VIZ.colors.bgTertiary;
         drawRoundRect(ctx, x, y, colW - 8, rowH, 4);
         ctx.fill();
         ctx.strokeStyle = VIZ.colors.textMuted + '44';
         ctx.lineWidth = 1;
         ctx.strokeRect(x, y, colW - 8, rowH);

         drawText(ctx, name, x + 8, y + rowH / 2, { align: 'left', color: VIZ.colors.accent, font: '600 12px sans-serif' });
         drawText(ctx, String(val).substring(0, 12), x + colW - 16, y + rowH / 2, { align: 'right', color: VIZ.colors.textPrimary, font: '500 12px sans-serif' });
       });
     }

     // Draw arrays
     const arrays = ds.arrays || {};
     let arrY = 240;
     Object.entries(arrays).forEach(([name, arr]) => {
       if (!Array.isArray(arr)) return;
       const count = arr.length;
       const maxDisplay = Math.min(count, 20);
       const boxW = Math.min(50, (w - 80) / maxDisplay);
       const totalW = maxDisplay * boxW;
       const startX = (w - totalW) / 2;

       drawText(ctx, `${name}[${count}]`, startX, arrY - 10, { align: 'left', color: VIZ.colors.warning, font: '600 12px sans-serif' });

       for (let i = 0; i < maxDisplay; i++) {
         const x = startX + i * boxW;
         ctx.fillStyle = VIZ.colors.bgTertiary;
         ctx.fillRect(x + 1, arrY, boxW - 2, 36);
         ctx.strokeStyle = VIZ.colors.textMuted + '55';
         ctx.strokeRect(x + 1, arrY, boxW - 2, 36);
         drawText(ctx, String(arr[i]), x + boxW / 2, arrY + 18, { color: VIZ.colors.textPrimary, font: '600 13px sans-serif' });
         drawText(ctx, String(i), x + boxW / 2, arrY + 50, { color: VIZ.colors.textMuted, font: '500 9px sans-serif' });
       }
       arrY += 80;
     });

     // Description
     if (step.description) {
       ctx.fillStyle = VIZ.colors.bgSecondary + 'dd';
       drawRoundRect(ctx, 20, h - 48, w - 40, 32, 6);
       ctx.fill();
       drawText(ctx, step.description, w / 2, h - 32, { color: VIZ.colors.textPrimary, font: '500 12px sans-serif' });
     }

     return;
   }

   // Delegate to category-specific renderer
   if (typeof originalDrawCanvas === 'function') {
     return originalDrawCanvas(timestamp);
   }
 };

 console.log('Part 4: Custom Code System loaded with parser, AI fix engine, and generic renderer');

(function() {

  /* ----------------------------------------------------------
     1. ENHANCED STEP NAVIGATION (forward & backward)

  /**
   * Step Over: Execute one source code line.
   * Moves to the next step in the pre-generated array.
   */
  window.stepOver = function() {
    if (!STATE.stepsGenerated || STATE.totalSteps === 0) {
      showToast('No algorithm loaded', 'warning');
      return;
    }
    if (STATE.currentStepIndex >= STATE.totalSteps - 1) {
      showToast('End of execution reached', 'warning', 1500);
      stopAutoPlay();
      return;
    }
    // Check for breakpoint on next step
    const nextStep = STATE.steps[STATE.currentStepIndex + 1];
    if (nextStep && STATE.breakpoints.has(nextStep.lineNumber)) {
      stopAutoPlay();
      showToast(`Breakpoint at line ${nextStep.lineNumber}`, 'info');
    }
    STATE.currentStepIndex++;
    refreshUI();
  };

  /**
   * Step Back: Reverse exactly one step.
   */
  window.stepBack = function() {
    if (!STATE.stepsGenerated) return;
    if (STATE.currentStepIndex <= -1) {
      showToast('Already at the beginning', 'warning', 1500);
      return;
    }
    STATE.currentStepIndex--;
    refreshUI();
  };

  /**
   * Step Into: Enter the next function call.
   * Finds the next step where call stack depth increases.
   */
  window.stepInto = function() {
    if (!STATE.stepsGenerated || STATE.currentStepIndex >= STATE.totalSteps - 1) {
      stepOver();
      return;
    }
    const currentDepth = getCallStackDepth(STATE.currentStepIndex);
    // Search forward for deeper stack
    for (let i = STATE.currentStepIndex + 1; i < STATE.totalSteps; i++) {
      const d = getCallStackDepth(i);
      if (d > currentDepth) {
        STATE.currentStepIndex = i;
        refreshUI();
        showToast(`Stepped into ${STATE.steps[i].callStackSnapshot[d - 1]?.functionName || 'function'}`, 'info');
        return;
      }
    }
    // No deeper call found, just step over
    stepOver();
  };

  /**
   * Step Out: Run until current function returns.
   * Finds the next step where call stack depth decreases.
   */
  window.stepOut = function() {
    if (!STATE.stepsGenerated || STATE.currentStepIndex < 0) return;
    const currentDepth = getCallStackDepth(STATE.currentStepIndex);
    if (currentDepth <= 1) {
      showToast('Already at top level', 'info');
      return;
    }
    // Search forward for shallower or equal stack
    for (let i = STATE.currentStepIndex + 1; i < STATE.totalSteps; i++) {
      const d = getCallStackDepth(i);
      if (d < currentDepth) {
        STATE.currentStepIndex = i;
        refreshUI();
        showToast('Stepped out of function', 'info');
        return;
      }
    }
    // Run to end
    STATE.currentStepIndex = STATE.totalSteps - 1;
    refreshUI();
  };

  /**
   * Next Block: Skip entire loop or conditional block.
   * Advances to the step after the current block ends.
   */
  window.nextBlock = function() {
    if (!STATE.stepsGenerated || STATE.currentStepIndex < 0) return;
    const currentLine = STATE.steps[STATE.currentStepIndex].lineNumber;
    // Find next step with different line number that's after current block
    for (let i = STATE.currentStepIndex + 1; i < STATE.totalSteps; i++) {
      const step = STATE.steps[i];
      if (step.lineNumber > currentLine + 1) {
        STATE.currentStepIndex = i;
        refreshUI();
        showToast('Skipped to next block', 'info');
        return;
      }
    }
    stepOver();
  };

  /**
   * Restart Program: Reset everything to initial state.
   */
  window.restartProgram = function() {
    if (!STATE.stepsGenerated) return;
    stopAutoPlay();
    STATE.currentStepIndex = -1;
    STATE.breakpoints.clear();
    refreshUI();
    showToast('Program restarted', 'info');
  };

  /**
   * Restart Current Function: Jump back to first line of current function.
   */
  window.restartFunction = function() {
    if (!STATE.stepsGenerated || STATE.currentStepIndex < 0) return;
    const currentStack = STATE.steps[STATE.currentStepIndex].callStackSnapshot || [];
    if (currentStack.length === 0) {
      restartProgram();
      return;
    }
    const currentFunc = currentStack[currentStack.length - 1].functionName;
    // Search backward for first occurrence of this function
    for (let i = STATE.currentStepIndex; i >= 0; i--) {
      const stack = STATE.steps[i].callStackSnapshot || [];
      const lastFrame = stack[stack.length - 1];
      if (lastFrame && lastFrame.functionName === currentFunc) {
        if (i === 0 || getCallStackDepth(i - 1) < stack.length) {
          STATE.currentStepIndex = i;
          refreshUI();
          showToast(`Restarted function: ${currentFunc}`, 'info');
          return;
        }
      }
    }
    restartProgram();
  };

  /**
   * Run to Breakpoint: Jump to next breakpoint.
   */
  window.runToBreakpoint = function() {
    if (!STATE.stepsGenerated || STATE.breakpoints.size === 0) {
      showToast('No breakpoints set', 'warning');
      return;
    }
    stopAutoPlay();
    for (let i = STATE.currentStepIndex + 1; i < STATE.totalSteps; i++) {
      const line = STATE.steps[i].lineNumber;
      if (STATE.breakpoints.has(line)) {
        STATE.currentStepIndex = i;
        refreshUI();
        showToast(`Hit breakpoint at line ${line}`, 'success');
        return;
      }
    }
    showToast('No more breakpoints ahead', 'warning');
  };

  /**
   * Toggle Play/Pause auto-animation.
   */
  window.togglePlay = function() {
    if (!STATE.stepsGenerated) return;
    if (STATE.isPlaying) {
      stopAutoPlay();
    } else {
      if (STATE.currentStepIndex >= STATE.totalSteps - 1) {
        STATE.currentStepIndex = -1;
      }
      startAutoPlay();
    }
  };

  /**
   * Start auto-play with current speed.
   */
  window.startAutoPlay = function() {
    STATE.isPlaying = true;
    updateControlBarState();
    const delay = Math.max(100, CONFIG.STEP_DELAY_BASE / STATE.speed);
    STATE.playInterval = setInterval(() => {
      if (STATE.currentStepIndex >= STATE.totalSteps - 1) {
        stopAutoPlay();
        return;
      }
      // Check breakpoints
      const nextStep = STATE.steps[STATE.currentStepIndex + 1];
      if (nextStep && STATE.breakpoints.has(nextStep.lineNumber)) {
        stopAutoPlay();
        STATE.currentStepIndex++;
        refreshUI();
        showToast(`Paused at breakpoint line ${nextStep.lineNumber}`, 'info');
        return;
      }
      STATE.currentStepIndex++;
      refreshUI();
    }, delay);
  };

  /**
   * Stop auto-play.
   */
  window.stopAutoPlay = function() {
    STATE.isPlaying = false;
    if (STATE.playInterval) {
      clearInterval(STATE.playInterval);
      STATE.playInterval = null;
    }
    updateControlBarState();
  };

  /**
   * Jump to specific step index (scrubber).
   */
  window.jumpToStep = function(index) {
    if (!STATE.stepsGenerated || STATE.totalSteps === 0) return;
    index = clamp(index, -1, STATE.totalSteps - 1);
    STATE.currentStepIndex = index;
    refreshUI();
  };

  /**
   * Get call stack depth at given step index.
   */
  function getCallStackDepth(idx) {
    if (idx < 0 || idx >= STATE.totalSteps) return 0;
    const stack = STATE.steps[idx].callStackSnapshot;
    return stack ? stack.length : 0;
  }

  /* ----------------------------------------------------------
     2. BREAKPOINT SYSTEM ENHANCEMENTS
     ---------------------------------------------------------- */

  /**
   * Toggle breakpoint on a line number.
   */
  window.toggleBreakpoint = function(lineNum) {
    if (STATE.breakpoints.has(lineNum)) {
      STATE.breakpoints.delete(lineNum);
      showToast(`Breakpoint removed at line ${lineNum}`, 'info', 1500);
    } else {
      STATE.breakpoints.add(lineNum);
      showToast(`Breakpoint set at line ${lineNum}`, 'success', 1500);
    }
    updateBreakpointUI();
  };

  /* ----------------------------------------------------------
     3. HISTORY LOG PANEL ENHANCEMENTS
     ---------------------------------------------------------- */

  /**
   * Toggle history panel visibility.
   */
  window.toggleHistoryPanel = function() {
    document.getElementById('historyPanel').classList.toggle('open');
  };

  /**
   * Add entry to history log with click-to-jump.
   */
  window.addHistoryEntry = function(stepIndex, description) {
    const list = document.getElementById('historyList');
    // Avoid duplicates
    const existing = list.querySelector(`[data-index="${stepIndex}"]`);
    if (existing) {
      // Update active state
      list.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
      existing.classList.add('active');
      existing.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      return;
    }

    const item = document.createElement('div');
    item.className = 'history-item';
    item.dataset.index = stepIndex;
    item.innerHTML = `
      <div class="history-step-num">Step ${stepIndex + 1}</div>
      <div class="history-desc">${escapeHtml(description || '')}</div>
    `;
    item.addEventListener('click', () => {
      jumpToStep(stepIndex);
      // Update active state
      list.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
    });
    list.appendChild(item);
    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    list.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
    item.classList.add('active');
  };

  /* ----------------------------------------------------------
     4. TOOLTIP SYSTEM ENHANCEMENTS
     ---------------------------------------------------------- */

  /**
   * Show tooltip at position with bilingual content.
   */
  window.showTooltip = function(x, y, title, body, arText) {
    const tooltipEl = document.getElementById('tooltip');
    const tooltipTitle = document.getElementById('tooltipTitle');
    const tooltipBody = document.getElementById('tooltipBody');
    const tooltipAr = document.getElementById('tooltipAr');

    tooltipTitle.textContent = title;
    tooltipBody.textContent = body;
    tooltipAr.textContent = arText || '';
    tooltipEl.classList.add('visible');
    positionTooltip(x, y);
  };

  window.hideTooltip = function() {
    document.getElementById('tooltip').classList.remove('visible');
  };

  function positionTooltip(x, y) {
    const tooltipEl = document.getElementById('tooltip');
    const rect = tooltipEl.getBoundingClientRect();
    let left = x + 16;
    let top = y + 16;
    if (left + rect.width > window.innerWidth) left = x - rect.width - 8;
    if (top + rect.height > window.innerHeight) top = y - rect.height - 8;
    tooltipEl.style.left = left + 'px';
    tooltipEl.style.top = top + 'px';
  }

  // Canvas tooltip for data structure elements
  canvas.addEventListener('mousemove', (e) => {
    if (!STATE.stepsGenerated || STATE.currentStepIndex < 0) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const step = STATE.steps[STATE.currentStepIndex];
    const ds = step.dataStructureSnapshot || {};

    // Simple hit detection based on category
    let title = '', body = '', ar = '';
    const cat = STATE.vizCategory;

    if (cat === 'tree' && ds.nodes && ds.highlightedNode) {
      const node = ds.nodes[ds.highlightedNode];
      if (node) {
        title = 'Binary Tree Node';
        body = `Key: ${node.iData}, Data: ${node.dData}`;
        ar = `عقدة الشجرة الثنائية: المفتاح ${node.iData}`;
      }
    } else if (cat === 'sort' && ds.array) {
      title = 'Array Element';
      body = `Current array state at step ${STATE.currentStepIndex + 1}`;
      ar = `حالة المصفوفة في الخطوة ${STATE.currentStepIndex + 1}`;
    } else if (cat === 'stack') {
      title = 'Stack';
      body = `Top index: ${ds.top}, Size: ${ds.stackArray?.filter(x => x !== null).length || 0}`;
      ar = `المكدس: أعلى فهرس ${ds.top}`;
    } else if (cat === 'queue') {
      title = 'Queue';
      body = `Front: ${ds.front}, Rear: ${ds.rear}, Items: ${ds.nItems}`;
      ar = `الطابور: الأمام ${ds.front}، الخلف ${ds.rear}`;
    }

    if (title) {
      showTooltip(e.clientX, e.clientY, title, body, ar);
    } else {
      hideTooltip();
    }
  });

  canvas.addEventListener('mouseleave', hideTooltip);

  /* ----------------------------------------------------------
     5. RESPONSIVE BREAKPOINTS & MOBILE ADAPTATIONS
     ---------------------------------------------------------- */

  function handleResize() {
    const w = window.innerWidth;
    const main = document.querySelector('.app-main');
    const codePanel = document.querySelector('.code-panel');
    const vizPanel = document.querySelector('.viz-panel');

    if (w <= 768) {
      // Mobile: stack vertically, code on top
      main.style.gridTemplateColumns = '1fr';
      main.style.gridTemplateRows = '45vh 1fr';
      codePanel.style.maxHeight = '45vh';
    } else if (w <= 1024) {
      // Tablet: equal split
      main.style.gridTemplateColumns = '1fr';
      main.style.gridTemplateRows = '1fr 1fr';
      codePanel.style.maxHeight = '50vh';
    } else {
      // Desktop: side by side
      main.style.gridTemplateColumns = 'minmax(360px, 1fr) minmax(0, 1.8fr)';
      main.style.gridTemplateRows = '';
      codePanel.style.maxHeight = '';
    }

    resizeCanvas();
  }

  /* ----------------------------------------------------------
     6. VARIABLES PANEL ENHANCEMENTS
     ---------------------------------------------------------- */

  /**
   * Update variables and call stack display with animations.
   */
  window.updateVariablesPanel = function(step) {
    const varsList = document.getElementById('variablesList');
    const callStackList = document.getElementById('callStackList');
    const depthLabel = document.getElementById('callStackDepth');

    if (!step) {
      varsList.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;">No execution data</div>';
      callStackList.innerHTML = '';
      depthLabel.textContent = '';
      return;
    }

    // Local variables with animation
    const vars = step.variablesSnapshot || {};
    const varEntries = Object.entries(vars);
    if (varEntries.length === 0) {
      varsList.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;">No local variables</div>';
    } else {
      // Only update changed variables to reduce DOM thrashing
      const existingCards = varsList.querySelectorAll('.var-card');
      const existingMap = new Map();
      existingCards.forEach(card => {
        const name = card.querySelector('.var-name')?.textContent;
        if (name) existingMap.set(name, card);
      });

      varEntries.forEach(([name, value]) => {
        const strVal = typeof value === 'object' ? JSON.stringify(value) : String(value);
        const existing = existingMap.get(name);

        if (existing) {
          const valEl = existing.querySelector('.var-value');
          const oldVal = valEl.textContent;
          if (oldVal !== strVal) {
            valEl.textContent = strVal;
            existing.style.animation = 'none';
            existing.offsetHeight; // trigger reflow
            existing.style.animation = 'varCardIn 0.3s ease';
          }
          existingMap.delete(name);
        } else {
          const card = document.createElement('div');
          card.className = 'var-card';
          card.innerHTML = `
            <span class="var-name">${escapeHtml(name)}</span>
            <span class="var-value">${escapeHtml(strVal)}</span>
          `;
          varsList.appendChild(card);
        }
      });

      // Remove stale cards
      existingMap.forEach(card => card.remove());
    }

    // Call stack
    const stack = step.callStackSnapshot || [];
    depthLabel.textContent = stack.length > 0 ? `Depth: ${stack.length}` : '';
    if (stack.length === 0) {
      callStackList.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;">Main thread</div>';
    } else {
      callStackList.innerHTML = stack.map((frame, idx) => {
        const locals = frame.locals || {};
        const localStr = Object.entries(locals)
          .filter(([k]) => k !== 'depth' && k !== 'arraySlice')
          .map(([k, v]) => `${k}=${typeof v === 'object' ? JSON.stringify(v) : v}`)
          .join(', ');
        return `
          <div class="call-stack-frame ${idx === stack.length - 1 ? 'active' : ''}">
            <div class="frame-header">${escapeHtml(frame.functionName || 'unknown')}</div>
            <div class="frame-vars">${escapeHtml(localStr)}</div>
          </div>
        `;
      }).join('');
    }
  };

  /* ----------------------------------------------------------
     7. CODE DISPLAY ENHANCEMENTS
     ---------------------------------------------------------- */

  /**
   * Update active line with smooth scroll and visual effects.
   */
  window.updateActiveLine = function(lineNumber) {
    document.querySelectorAll('.code-line').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.line) === lineNumber);
    });

    const active = document.querySelector(`.code-line[data-line="${lineNumber}"]`);
    if (active) {
      active.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // Also highlight corresponding line number
    document.querySelectorAll('.line-num').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.line) === lineNumber);
    });
  };

  /* ----------------------------------------------------------
     8. MAIN REFRESH UI
     ---------------------------------------------------------- */

  /**
   * Refresh all UI components after step change.
   */
  window.refreshUI = function() {
    const step = STATE.steps[STATE.currentStepIndex];

    // Update code highlighting
    if (step && step.lineNumber) {
      updateActiveLine(step.lineNumber);
    } else {
      document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active'));
    }

    // Update variables panel
    updateVariablesPanel(step);

    // Update control bar
    updateControlBarState();

    // Trigger canvas redraw
    requestAnimationFrame(window.drawCanvas);

    // Add to history
    if (step && STATE.currentStepIndex >= 0) {
      addHistoryEntry(STATE.currentStepIndex, step.description || 'Executing...');
    }

    // Update viz badge
    if (step && step.dataStructureSnapshot) {
      const op = step.dataStructureSnapshot.operation;
      if (op) {
        document.getElementById('vizBadgeText').textContent = op.replace(/-/g, ' ');
      }
    }
  };

  /* ----------------------------------------------------------
     9. CONTROL BAR STATE UPDATES
     ---------------------------------------------------------- */

  window.updateControlBarState = function() {
    const hasSteps = STATE.stepsGenerated && STATE.totalSteps > 0;
    const atStart = STATE.currentStepIndex <= -1;
    const atEnd = STATE.currentStepIndex >= STATE.totalSteps - 1;

    document.getElementById('btnStepBack').disabled = !hasSteps || atStart;
    document.getElementById('btnRestart').disabled = !hasSteps;
    document.getElementById('btnStepOver').disabled = !hasSteps || atEnd;
    document.getElementById('btnStepInto').disabled = !hasSteps || atEnd;
    document.getElementById('btnStepOut').disabled = !hasSteps || atEnd;
    document.getElementById('btnNextBlock').disabled = !hasSteps || atEnd;
    document.getElementById('btnPlay').disabled = !hasSteps || atEnd;

    const playBtn = document.getElementById('btnPlay');
    playBtn.textContent = STATE.isPlaying ? '⏸' : '▶';
    playBtn.title = STATE.isPlaying ? 'Pause (Space)' : 'Play (Space)';

    updateStepCounter();
    updateScrubber();
  };

  /* ----------------------------------------------------------
     10. ALGORITHM CHANGE HANDLER (enhanced)
     ---------------------------------------------------------- */

  /**
   * Handle algorithm selection change.
   */
  window.onAlgorithmChange = function(key) {
    STATE.algorithm = key;
    STATE.isCustomMode = false;
    STATE.stepsGenerated = false;
    STATE.currentStepIndex = -1;
    STATE.breakpoints.clear();

    saveToStorage(CONFIG.STORAGE_KEYS.LAST_ALGORITHM, key);

    // Switch to preset tab
    switchTab('preset');

    const algoMeta = CONFIG.ALGORITHMS.find(a => a.key === key);
    if (algoMeta) {
      STATE.vizCategory = algoMeta.category;
      document.getElementById('vizBadgeText').textContent = algoMeta.name;
      document.getElementById('vizBadge').style.display = 'inline-flex';
    }

    if (!ALGORITHM_REGISTRY[key]) {
      showToast(`Algorithm "${key}" not found`, 'error');
      renderCodeDisplay('// Algorithm not available');
      updateControlBarState();
      return;
    }

    const algo = ALGORITHM_REGISTRY[key];
    renderCodeDisplay(algo.javaCode);
    generateAndLoadSteps(key);
    showToast(`Loaded: ${algoMeta.name}`, 'success');
  };

  /**
   * Generate steps and load into state.
   */
  window.generateAndLoadSteps = function(algoKey) {
    const algo = ALGORITHM_REGISTRY[algoKey];
    if (!algo || typeof algo.generateSteps !== 'function') {
      STATE.steps = [];
      STATE.totalSteps = 0;
      STATE.stepsGenerated = false;
      updateControlBarState();
      return;
    }

    try {
      STATE.steps = algo.generateSteps();
      STATE.totalSteps = STATE.steps.length;
      STATE.stepsGenerated = true;
      STATE.currentStepIndex = -1;
      updateControlBarState();
      showToast(`Generated ${STATE.totalSteps} execution steps`, 'success');
    } catch (err) {
      console.error('Step generation failed:', err);
      STATE.steps = [];
      STATE.totalSteps = 0;
      STATE.stepsGenerated = false;
      showToast('Failed to generate steps: ' + err.message, 'error');
      updateControlBarState();
    }
  };

  /* ----------------------------------------------------------
     11. INITIALIZATION
     ---------------------------------------------------------- */

  /**
   * Main initialization — called on window load.
   * Replaces the stub from Part 1.
   */
  window.init = function() {
    initTheme();
    initAlgorithmSelector();
    initCustomCodeUI();
    initControlBar();
    initHistoryPanel();
    initHelpModal();

    // Global event listeners
    document.addEventListener('keydown', handleKeydown);
    window.addEventListener('resize', debounce(handleResize, 150));

    // Modal handlers
    document.getElementById('modalClose').addEventListener('click', closeHelpModal);
    document.getElementById('helpModal').addEventListener('click', (e) => {
      if (e.target.id === 'helpModal') closeHelpModal();
    });

    // Header buttons
    document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);
    document.getElementById('helpBtn').addEventListener('click', openHelpModal);
    document.getElementById('historyToggleBtn').addEventListener('click', toggleHistoryPanel);
    document.getElementById('historyCloseBtn').addEventListener('click', toggleHistoryPanel);

    // Initial sizing
    handleResize();

    // Welcome
    showToast('Welcome to the Lafore Visual Debugger', 'info', 4000);
    showToast('All systems operational — 16 Lafore algorithms ready', 'success', 3000);

    // Auto-select first algorithm if none saved
    const lastAlgo = loadFromStorage(CONFIG.STORAGE_KEYS.LAST_ALGORITHM, '');
    if (!lastAlgo && CONFIG.ALGORITHMS.length > 0) {
      const select = document.getElementById('algorithmSelect');
      select.value = CONFIG.ALGORITHMS[0].key;
      onAlgorithmChange(CONFIG.ALGORITHMS[0].key);
    }
  };

  // Override window.onload
  window.removeEventListener('DOMContentLoaded', window.init);
  window.addEventListener('DOMContentLoaded', window.init);

  console.log('Part 5: Integration & Finalization loaded — all systems connected');
})();
